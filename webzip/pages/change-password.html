<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config: Security | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div class="ambient-text">SECURITY_CFG</div>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <div id="sidebar-root"></div>

        <!-- MIDDLE PANEL: Workspace -->
        <main class="workspace">
            <div class="settings-container">

                <button class="btn-cancel" style="padding: 8px 0; margin-bottom: 24px; display: inline-flex;"
                    onclick="window.location.href='settings.html'">
                    <i data-lucide="arrow-left" style="width: 16px; height: 16px; margin-right: 8px;"></i> Back to
                    Config Index
                </button>

                <div class="sys-badge">
                    <i data-lucide="lock" style="width: 14px; height: 14px;"></i> Security Setting
                </div>
                <h1 class="sys-title">Change Password</h1>
                <p class="sys-desc">Execute an update command on your node's authentication cipher. Require old kernel
                    key to proceed.</p>

                <div class="config-card">
                    <form>
                        <div class="form-group">
                            <label class="form-label" for="currentPassword">Current Cipher</label>
                            <input type="password" id="currentPassword" placeholder="> Enter active password">
                            <i data-lucide="eye" class="eye" onclick="togglePassword('currentPassword', this)"
                                style="width: 18px; height: 18px;"></i>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="newPassword">New Cipher</label>
                            <input type="password" id="newPassword" placeholder="> Enter new sequence">
                            <i data-lucide="eye" class="eye" onclick="togglePassword('newPassword', this)"
                                style="width: 18px; height: 18px;"></i>
                            <div class="hint-text"><i data-lucide="info" style="width: 12px; height: 12px;"></i> Minimum
                                8 character length requirement.</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">Verify Cipher</label>
                            <input type="password" id="confirmPassword" placeholder="> Re-enter new sequence">
                            <i data-lucide="eye" class="eye" onclick="togglePassword('confirmPassword', this)"
                                style="width: 18px; height: 18px;"></i>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn-cancel" onclick="location.href='settings.html'">Abort
                                Mod</button>
                            <button type="button" class="btn-save" onclick="changePassword()">
                                <i data-lucide="save" style="width: 16px; height: 16px;"></i> Override Cipher
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        style="position: fixed; bottom: 32px; right: 32px; background: var(--bg-elevated); border: 1px solid var(--success-green); color: var(--text-primary); padding: 16px 24px; border-radius: 8px; font-family: var(--font-mono); font-size: 0.85rem; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 100; visibility: hidden;">
        <i data-lucide="shield-check" style="width: 18px; height: 18px; color: var(--success-green);"></i>
        <span>[200] CIPHER UPDATED SUCCESSFULLY.</span>
    </div>

    <script src="js/script.js"></script>
    <script>
        lucide.createIcons();

        // Set a default password if not exists (for first time)
        if (!localStorage.getItem("userPassword")) {
            localStorage.setItem("userPassword", "student123");
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.visibility = 'visible';
            t.style.transform = 'translateY(0)';
            t.style.opacity = '1';
            setTimeout(() => {
                t.style.transform = 'translateY(100px)';
                t.style.opacity = '0';
                setTimeout(() => { t.style.visibility = 'hidden'; }, 300);
            }, 3000);
        }

        function changePassword() {
            const current = document.getElementById("currentPassword").value;
            const newPass = document.getElementById("newPassword").value;
            const confirm = document.getElementById("confirmPassword").value;

            const savedPassword = localStorage.getItem("userPassword");

            if (current === "" || newPass === "" || confirm === "") {
                alert("ERR: Missing parameters in payload.");
                return;
            }

            if (current !== savedPassword) {
                alert("ERR: Current cipher auth failed.");
                return;
            }

            if (newPass.length < 8) {
                alert("ERR: Length must be >= 8 chars.");
                return;
            }

            if (newPass !== confirm) {
                alert("ERR: New cipher parameters do not match.");
                return;
            }

            localStorage.setItem("userPassword", newPass);

            showToast();

            // Clear inputs
            document.getElementById("currentPassword").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmPassword").value = "";
        }

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);

            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = `<line x1="2" y1="2" x2="22" y2="22"></line><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>`;
            } else {
                input.type = "password";
                icon.innerHTML = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle>`;
            }
        }
    </script>

    

    

    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderSidebar({
                activePage: 'settings',
                context: 'app'
            });
        });
    </script>
</body>


</html>
