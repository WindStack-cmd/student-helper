<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Bounties | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div class="ambient-text">BOUNTY_FEED</div>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <div id="sidebar-root"></div>

        <!-- MIDDLE PANEL: Workspace -->
        <main class="workspace">
            <div class="bounty-container">

                <div class="header-area">
                    <div class="header-content">
                        <div class="sys-badge">
                            <i data-lucide="radar" style="width: 14px; height: 14px;"></i> System Scanner
                        </div>
                        <h1 class="sys-title">Bounty Feed.</h1>
                    </div>
                </div>

                <div class="requests-grid" id="requestsContainer">
                    <!-- Cards will be dynamically injected here... -->
                </div>

            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
    <script>
        lucide.createIcons();

        function logout() {
            window.location.href = "login.html";
        }

        const container = document.getElementById("requestsContainer");
        const requests = JSON.parse(localStorage.getItem("allRequests")) || [];

        // Reverse the array to show newest first, though let's keep it as is if there's no sorted need
        if (requests.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i data-lucide="search-x" style="width: 48px; height: 48px; opacity: 0.5;"></i>
                    <p>[ SYSTEM IDLE - NO TARGETS DETECTED ]</p>
                </div>
            `;
            lucide.createIcons();
        } else {
            requests.forEach((req, index) => {
                const card = document.createElement("div");
                card.className = "request-card";

                let iconStr = "terminal";
                if (req.type === "Notes") iconStr = "file-text";
                if (req.type === "Tech Help") iconStr = "code";
                if (req.type === "Tutoring") iconStr = "video";

                const isPending = req.status === "Pending" || req.status === "Active" || req.status === "Open";
                const statusClass = isPending ? "pending" : "completed";
                const statusIcon = isPending ? "clock" : "check-circle";

                card.innerHTML = `
                    <div class="req-meta-top">
                        <span style="display: flex; align-items: center; gap: 8px;">
                            <i data-lucide="${iconStr}" style="width: 14px; height: 14px; color: var(--text-tertiary);"></i>
                            ${req.type || "SYS_REQ"}
                        </span>
                        <span class="req-status ${statusClass}">
                            <i data-lucide="${statusIcon}" style="width: 12px; height: 12px;"></i>
                            ${req.status}
                        </span>
                    </div>
                    <h3 class="req-title">${req.title}</h3>
                    <p class="req-desc">${req.description || "No description provided format detected."}</p>
                    <div class="req-footer">
                        <span class="req-date"><i data-lucide="calendar" style="width: 12px; height: 12px; vertical-align:-2px; margin-right:4px;"></i> ${req.date || "UNKNOWN"}</span>
                        ${isPending ? `<button class="req-btn" onclick="openHelpRequest(${index})">Access Target <i data-lucide="arrow-right" style="width: 12px; height: 12px;"></i></button>` : `<span style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-tertiary); text-transform:uppercase;">[ BOUNTY CLOSED ]</span>`}
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function openHelpRequest(index) {
            localStorage.setItem("selectedRequestIndex", index);
            window.location.href = "help-request.html";
        }
    </script>

    

    

    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderSidebar({
                activePage: 'home',
                context: 'public'
            });
        });
    </script>
</body>


</html>
