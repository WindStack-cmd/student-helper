<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Directive | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #030305;
            --bg-surface: #0a0a0e;
            --bg-elevated: #111118;

            --text-primary: #ffffff;
            --text-secondary: #84849a;
            --text-tertiary: #4a4a5e;

            --accent-lime: #ccff00;
            --accent-purple: #7b42fa;
            --accent-blue: #00e5ff;

            --border-dim: rgba(255, 255, 255, 0.05);
            --border-bright: rgba(255, 255, 255, 0.15);

            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --danger-red: #ff3366;
            --success-green: #ccff00;
            --warning-amber: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ----- LEFT PANEL: NAVIGATION TREE ----- */
        .sidebar-nav {
            width: 260px;
            height: 100%;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .brand-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--text-primary);
            color: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .brand-header:hover .brand-icon {
            transform: scale(1.1) rotate(5deg);
            background: var(--danger-red);
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            flex: 1;
            padding: 32px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .nav-menu::-webkit-scrollbar {
            width: 4px;
        }

        .nav-menu::-webkit-scrollbar-thumb {
            background: var(--border-dim);
        }

        .nav-section h4 {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            padding-left: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-item.active {
            background: rgba(255, 51, 102, 0.05);
            /* Red tinted for Hunt Mode */
            color: var(--danger-red);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 20px;
            width: 3px;
            background: var(--danger-red);
            border-radius: 0 4px 4px 0;
        }

        .nav-item:hover:not(.active) {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding: 32px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-footer:hover {
            background: var(--bg-elevated);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--danger-red);
            border: 1px solid var(--border-dim);
            font-size: 0.85rem;
        }

        .user-info {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* ----- MIDDLE PANEL: WORKSPACE ----- */
        .workspace {
            flex: 1;
            display: flex;
            background: var(--bg-base);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .workspace::-webkit-scrollbar {
            width: 4px;
        }

        .workspace::-webkit-scrollbar-thumb {
            background: var(--border-dim);
        }

        /* Background Typography */
        .ambient-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-display);
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 51, 102, 0.015);
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
            letter-spacing: -0.05em;
        }

        .target-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 80px 120px;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .btn-back {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 8px 16px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            align-self: flex-start;
        }

        .btn-back:hover {
            color: var(--text-primary);
            border-color: var(--border-dim);
            background: var(--bg-surface);
        }

        .dossier-card {
            background: var(--bg-surface);
            border: 1px solid var(--danger-red);
            border-radius: 12px;
            padding: 48px;
            position: relative;
            box-shadow: 0 0 40px rgba(255, 51, 102, 0.1);
        }

        .dossier-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: rgba(255, 51, 102, 0.1);
            border-bottom: 1px solid rgba(255, 51, 102, 0.2);
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }

        .dossier-header-deco {
            position: absolute;
            top: 12px;
            left: 16px;
            display: flex;
            gap: 8px;
        }

        .deco-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-tertiary);
        }

        .dossier-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-primary);
            line-height: 1.2;
            margin-top: 16px;
            margin-bottom: 32px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
            padding: 24px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .meta-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .meta-value {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .payload-section {
            margin-bottom: 48px;
        }

        .payload-label {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-lime);
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .payload-content {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.8;
            padding: 24px;
            background: rgba(204, 255, 0, 0.02);
            border-left: 2px solid var(--accent-lime);
            white-space: pre-wrap;
        }

        .warning-box {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid var(--warning-amber);
            border-radius: 8px;
            margin-bottom: 32px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--warning-amber);
            text-transform: uppercase;
        }

        .btn-accept {
            width: 100%;
            background: var(--danger-red);
            color: #fff;
            border: 1px solid var(--danger-red);
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-accept:hover {
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
            background: transparent;
            color: var(--danger-red);
        }

        #loadingState {
            padding: 40px;
            text-align: center;
            font-family: var(--font-mono);
            color: var(--text-tertiary);
        }

        @media (max-width: 900px) {
            .sidebar-nav {
                width: 80px;
            }

            .brand-name,
            .nav-item span,
            .nav-badge,
            .user-info {
                display: none;
            }

            .target-container {
                padding: 40px 24px;
            }

            .meta-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-text">TARGET_LOCK</div>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <aside class="sidebar-nav">
            <a href="dashboard.html" class="brand-header">
                <div class="brand-icon">
                    <i data-lucide="terminal" style="width: 18px; height: 18px;"></i>
                </div>
                <div class="brand-name">StudentsHelper</div>
            </a>

            <div class="nav-menu">
                <div class="nav-section">
                    <h4>Workspace</h4>
                    <a href="dashboard.html" class="nav-item">
                        <i data-lucide="cpu" style="width: 18px; height: 18px;"></i>
                        <span>Overview</span>
                    </a>
                    <a href="community-chat.html" class="nav-item">
                        <i data-lucide="radio" style="width: 18px; height: 18px;"></i>
                        <span>Network</span>
                        <span class="nav-badge">3</span>
                    </a>
                    <a href="leaderboard.html" class="nav-item">
                        <i data-lucide="bar-chart-2" style="width: 18px; height: 18px;"></i>
                        <span>Ledger</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>Operations</h4>
                    <a href="my-requests.html" class="nav-item">
                        <i data-lucide="folder-open" style="width: 18px; height: 18px;"></i>
                        <span>Active Bounties</span>
                    </a>
                    <a href="help-others.html" class="nav-item active">
                        <i data-lucide="crosshair" style="width: 18px; height: 18px;"></i>
                        <span>Hunt Mode</span>
                    </a>
                    <a href="view-requests.html" class="nav-item">
                        <i data-lucide="list" style="width: 18px; height: 18px;"></i>
                        <span>Target Feed</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>System</h4>
                    <a href="profile.html" class="nav-item">
                        <i data-lucide="user" style="width: 18px; height: 18px;"></i>
                        <span>Identity</span>
                    </a>
                    <a href="settings.html" class="nav-item">
                        <i data-lucide="sliders" style="width: 18px; height: 18px;"></i>
                        <span>Config</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-footer" onclick="window.location.href='profile.html'" title="View Profile">
                <div class="user-avatar" id="sidebarAvatar">JD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarName">John Doe</div>
                    <div class="user-role">...</div>
                </div>
                <i data-lucide="power" onclick="event.stopPropagation(); logout()"
                    style="color: var(--danger-red); width: 16px; height: 16px; margin-left: auto; cursor: pointer;" title="Logout"></i>
            </div>
        </aside>

        <!-- MIDDLE PANEL: Workspace -->
        <main class="workspace">
            <div class="target-container">

                <button class="btn-back" onclick="window.location.href='view-requests.html'">
                    <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Abort Directive
                </button>

                <div class="dossier-card" id="cardContent">
                    <div class="dossier-header-deco">
                        <div class="deco-dot" style="background: var(--danger-red);"></div>
                        <div class="deco-dot" style="background: var(--warning-amber);"></div>
                        <div class="deco-dot" style="background: var(--success-green);"></div>
                    </div>

                    <div id="requestDetails">
                        <!-- Filled by JS -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
        style="position: fixed; bottom: 32px; right: 32px; background: var(--bg-elevated); border: 1px solid var(--danger-red); color: var(--text-primary); padding: 16px 24px; border-radius: 8px; font-family: var(--font-mono); font-size: 0.85rem; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 100; visibility: hidden;">
        <i data-lucide="crosshair" style="width: 18px; height: 18px; color: var(--danger-red);"></i>
        <span>[200] BOUNTY CLAIMED AND RESOLVED.</span>
    </div>

    <script src="../js/script.js"></script>
    <script>
        lucide.createIcons();

        function logout() {
            window.location.href = "login.html";
        }

        const requestIndex = localStorage.getItem("selectedRequestIndex");
        const allRequests = JSON.parse(localStorage.getItem("allRequests")) || [];
        const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser")) || { email: 'sys-admin@sys.local' };

        const detailsDiv = document.getElementById("requestDetails");

        if (requestIndex === null || !allRequests[requestIndex]) {
            detailsDiv.innerHTML = `
                <div style="text-align:center; color: var(--danger-red); font-family:var(--font-mono); padding: 40px;">
                    <i data-lucide="alert-triangle" style="width: 48px; height: 48px; margin-bottom:16px;"></i>
                    <p>[ ERROR_404 ]: TARGET PACKET CORRUPTED OR NOT FOUND.</p>
                </div>
            `;
            lucide.createIcons();
        } else {
            const req = allRequests[requestIndex];

            const isPending = req.status !== "Completed";
            const statusColor = isPending ? "var(--warning-amber)" : "var(--text-secondary)";

            detailsDiv.innerHTML = `
                <h1 class="dossier-title">${req.title}</h1>
                
                <div class="meta-grid">
                    <div class="meta-item">
                        <span class="meta-label">Classification</span>
                        <span class="meta-value">${req.type || "GENERIC_DIRECTIVE"}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Target Status</span>
                        <span class="meta-value" style="color: ${statusColor};"><i data-lucide="radio" style="width:14px; height:14px; vertical-align:middle; margin-right:4px;"></i> ${req.status}</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Timestamp Broadcasted</span>
                        <span class="meta-value">${req.date || "UNKNOWN"}</span>
                    </div>
                    ${req.acceptedBy ? `
                    <div class="meta-item">
                        <span class="meta-label">Claimed By Node</span>
                        <span class="meta-value" style="color: var(--success-green);">${req.acceptedBy}</span>
                    </div>` : ''}
                </div>

                <div class="payload-section">
                    <div class="payload-label">
                        <i data-lucide="file-code-2" style="width: 16px; height: 16px;"></i> Decrypted Payload
                    </div>
                    <div class="payload-content">${req.description || "No operational payload detected in broadcast."}</div>
                </div>

                ${isPending ? `
                <div class="warning-box">
                    <i data-lucide="alert-octagon" style="width: 20px; height: 20px;"></i>
                    Executing this action permanently closes the bounty. Ensure payload requirement is satisfied.
                </div>
                <button id="acceptBtn" class="btn-accept" onclick="acceptHelp()">
                    <i data-lucide="crosshair" style="width: 20px; height: 20px;"></i> Execute Resolution Action
                </button>
                ` : `
                <button class="btn-accept" style="background: transparent; color: var(--text-secondary); border-color: var(--border-dim); cursor: not-allowed;">
                    <i data-lucide="slash" style="width: 20px; height: 20px;"></i> Target Previously Eliminated
                </button>
                `}
            `;
            lucide.createIcons();
        }

        function acceptHelp() {
            if (!loggedInUser) {
                alert("ERR: Node unauthenticated.");
                window.location.href = "login.html";
                return;
            }

            if (requestIndex === null || !allRequests[requestIndex]) {
                alert("ERR: Missing target ID.");
                return;
            }

            const btn = document.getElementById('acceptBtn');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width: 20px; height: 20px; animation: spin 1s linear infinite;"></i> Processing Resolution...';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.8';
            lucide.createIcons();

            setTimeout(() => {
                const req = allRequests[requestIndex];
                req.status = "Completed";
                req.acceptedBy = loggedInUser.email;
                req.acceptedOn = new Date().toLocaleDateString();

                localStorage.setItem("allRequests", JSON.stringify(allRequests));
                updateDashboardCounts();
                localStorage.removeItem("selectedRequestIndex");

                const t = document.getElementById('toast');
                t.style.visibility = 'visible';
                t.style.transform = 'translateY(0)';
                t.style.opacity = '1';

                setTimeout(() => {
                    window.location.href = "help-others.html";
                }, 1500);

            }, 1000);
        }

        function updateDashboardCounts() {
            let dashboardData = JSON.parse(localStorage.getItem("dashboardData")) || {};
            dashboardData.pendingRequests = allRequests.filter(r => r.status === "Pending").length;
            dashboardData.helpedOthers = allRequests.filter(r => r.status === "Completed").length;
            localStorage.setItem("dashboardData", JSON.stringify(dashboardData));
        }
    </script>

    

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const name = user.first_name || user.name || (user.email ? user.email.split("@")[0] : "User");
                    const email = user.email || "user@system.node";
                    
                    document.querySelectorAll('.user-name').forEach(el => el.innerText = name);
                    document.querySelectorAll('.user-avatar').forEach(el => el.innerText = name.charAt(0).toUpperCase());
                    document.querySelectorAll('.user-role').forEach(el => el.innerText = email);
                } catch(e) {}
            }
        });
    </script>
</body>


</html>
