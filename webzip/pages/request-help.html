<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Bounty | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div class="ambient-text">ISSUE_REQ</div>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <div id="sidebar-root"></div>

        <!-- MIDDLE PANEL: Workspace -->
        <main class="workspace">
            <div class="post-container">

                <div class="sys-badge">
                    <i data-lucide="plus-square" style="width: 14px; height: 14px;"></i> Issue Creation
                </div>
                <h1 class="sys-title">Post Bounty</h1>
                <p class="sys-desc">Transmit an issue request to the active network. Detailed payloads yield faster
                    compilation closures.</p>

                <form class="terminal-form" id="requestForm" onsubmit="submitHelpRequest(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="requestTitle">Bounty Directive *</label>
                            <input type="text" id="requestTitle" class="form-input"
                                placeholder="> e.g., Implement QuickSort Algorithm in Python" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="helpType">Classification Type *</label>
                            <select id="helpType" class="form-select" required>
                                <option value="" disabled selected>> Select operational domain...</option>
                                <option value="Notes">SYS_NOTES / Notes & Summaries</option>
                                <option value="Tech Help">TECH_HUNT / Code Debugging & Implementation</option>
                                <option value="Tutoring">TUTORIAL / Live Session Walkthrough</option>
                                <option value="Other">MISC / Other Academic Directive</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="requestDesc">Payload / Stack Trace *</label>
                            <textarea id="requestDesc" class="form-textarea"
                                placeholder="> Provide full context. What have you tried so far? What is the expected output?"
                                required></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="window.location.href='my-requests.html'">Abort
                            Process</button>
                        <button type="submit" class="btn-submit" id="submitBtn">
                            <i data-lucide="upload" style="width: 16px; height: 16px;"></i> Publish Bounty
                        </button>
                    </div>
                </form>

            </div>
        </main>
    </div>

    <script src="../js/request-help.js"></script>
   <script>

async function submitHelpRequest(event){

event.preventDefault()

const btn = document.getElementById("submitBtn")
const originalText = btn.innerHTML
btn.innerHTML="Publishing..."

const title = document.getElementById("requestTitle").value
const description = document.getElementById("requestDesc").value

let email = "user@system.node"
const userStr = localStorage.getItem("loggedInUser")
if (userStr) {
    try {
        email = JSON.parse(userStr).email
    } catch(e) {}
}

try {
    const response = await fetch("http://127.0.0.1:5000/post_request",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            title:title,
            description:description,
            email:email,
            bounty: 50
        })
    })

    const data = await response.json()
    alert(data.message)
    window.location.href="dashboard.html"
} catch (error) {
    alert("Error saving request. Please check if backend is running properly.");
    btn.innerHTML = originalText;
}

}

</script>


    <script>
        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "../index.html";
        }

        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const name = user.first_name || user.name || "User";
                    const email = user.email || "user@system.node";
                    
                    document.querySelectorAll('.user-name').forEach(el => el.innerText = name);
                    document.querySelectorAll('.user-avatar').forEach(el => el.innerText = name.charAt(0).toUpperCase());
                    document.querySelectorAll('.user-role').forEach(el => el.innerText = email);
                } catch(e) {}
            }
        });
    </script>

    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderSidebar({
                activePage: 'my-requests',
                context: 'app'
            });
        });
    </script>
</body>


</html>
