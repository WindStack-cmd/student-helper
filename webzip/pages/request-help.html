<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Bounty | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #030305;
            --bg-surface: #0a0a0e;
            --bg-elevated: #111118;

            --text-primary: #ffffff;
            --text-secondary: #84849a;
            --text-tertiary: #4a4a5e;

            --accent-lime: #ccff00;
            --accent-purple: #7b42fa;
            --accent-blue: #00e5ff;

            --border-dim: rgba(255, 255, 255, 0.05);
            --border-bright: rgba(255, 255, 255, 0.15);

            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --danger-red: #ff3366;
            --success-green: #ccff00;
            --warning-amber: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ----- LEFT PANEL: NAVIGATION TREE ----- */
        .sidebar-nav {
            width: 260px;
            height: 100%;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .brand-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--text-primary);
            color: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .brand-header:hover .brand-icon {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent-lime);
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            flex: 1;
            padding: 32px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .nav-menu::-webkit-scrollbar {
            width: 4px;
        }

        .nav-menu::-webkit-scrollbar-thumb {
            background: var(--border-dim);
        }

        .nav-section h4 {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            padding-left: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-item.active {
            background: rgba(204, 255, 0, 0.05);
            /* Lime tinted for Bounties */
            color: var(--accent-lime);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 20px;
            width: 3px;
            background: var(--accent-lime);
            border-radius: 0 4px 4px 0;
        }

        .nav-item:hover:not(.active) {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .nav-badge {
            margin-left: auto;
            background: var(--text-primary);
            color: var(--bg-base);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .sidebar-footer {
            padding: 32px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-footer:hover {
            background: var(--bg-elevated);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--accent-blue);
            border: 1px solid var(--border-dim);
            font-size: 0.85rem;
        }

        .user-info {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* ----- MIDDLE PANEL: WORKSPACE ----- */
        .workspace {
            flex: 1;
            display: flex;
            background: var(--bg-base);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .workspace::-webkit-scrollbar {
            width: 4px;
        }

        .workspace::-webkit-scrollbar-thumb {
            background: var(--border-dim);
        }

        /* Background Typography */
        .ambient-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-display);
            font-size: 25vw;
            font-weight: 900;
            color: rgba(204, 255, 0, 0.015);
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
            letter-spacing: -0.05em;
        }

        /* Post Container */
        .post-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 80px;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .sys-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-lime);
            text-transform: uppercase;
            border: 1px solid var(--accent-lime);
            padding: 6px 12px;
            border-radius: 4px;
            margin-bottom: 24px;
            background: rgba(204, 255, 0, 0.05);
            align-self: flex-start;
        }

        .sys-title {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            margin-bottom: 16px;
        }

        .sys-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            font-family: var(--font-mono);
            margin-bottom: 48px;
        }

        .terminal-form {
            background: rgba(10, 10, 14, 0.8);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            padding: 40px;
            backdrop-filter: blur(12px);
            position: relative;
        }

        .terminal-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-lime);
            border-radius: 12px 0 0 12px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.80rem;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-dim);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.95rem;
            padding: 16px;
            border-radius: 8px;
            transition: all 0.2s;
            outline: none;
        }

        .form-textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: var(--accent-lime);
            background: rgba(204, 255, 0, 0.02);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.1);
        }

        .form-select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%2384849a" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>');
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            cursor: pointer;
        }

        .form-select option {
            background: #111118;
            color: #ffffff;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
        }

        .form-select option:checked {
            background: #1a1a2e;
        }

        .form-select option:hover {
            background: #1a1a2e;
        }

        .form-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px dashed var(--border-dim);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 14px 24px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            color: var(--text-primary);
            border-color: var(--border-dim);
        }

        .btn-submit {
            background: var(--accent-lime);
            color: var(--bg-base);
            border: 1px solid var(--accent-lime);
            padding: 14px 32px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.4);
            filter: brightness(1.2);
        }

        @media (max-width: 900px) {
            .sidebar-nav {
                width: 80px;
            }

            .brand-name,
            .nav-item span,
            .nav-badge,
            .user-info {
                display: none;
            }

            .post-container {
                padding: 40px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-text">ISSUE_REQ</div>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <aside class="sidebar-nav">
            <a href="dashboard.html" class="brand-header">
                <div class="brand-icon">
                    <i data-lucide="terminal" style="width: 18px; height: 18px;"></i>
                </div>
                <div class="brand-name">StudentsHelper</div>
            </a>

            <div class="nav-menu">
                <div class="nav-section">
                    <h4>Workspace</h4>
                    <a href="dashboard.html" class="nav-item">
                        <i data-lucide="cpu" style="width: 18px; height: 18px;"></i>
                        <span>Overview</span>
                    </a>
                    <a href="community-chat.html" class="nav-item">
                        <i data-lucide="radio" style="width: 18px; height: 18px;"></i>
                        <span>Network</span>
                        <span class="nav-badge">3</span>
                    </a>
                    <a href="leaderboard.html" class="nav-item">
                        <i data-lucide="bar-chart-2" style="width: 18px; height: 18px;"></i>
                        <span>Ledger</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>Operations</h4>
                    <a href="my-requests.html" class="nav-item active">
                        <i data-lucide="folder-open" style="width: 18px; height: 18px;"></i>
                        <span>Active Bounties</span>
                    </a>
                    <a href="help-others.html" class="nav-item">
                        <i data-lucide="crosshair" style="width: 18px; height: 18px;"></i>
                        <span>Hunt Mode</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>System</h4>
                    <a href="profile.html" class="nav-item">
                        <i data-lucide="user" style="width: 18px; height: 18px;"></i>
                        <span>Identity</span>
                    </a>
                    <a href="settings.html" class="nav-item">
                        <i data-lucide="sliders" style="width: 18px; height: 18px;"></i>
                        <span>Config</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-footer" onclick="window.location.href='profile.html'" title="View Profile">
                <div class="user-avatar" id="sidebarAvatar">JD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarName">John Doe</div>
                    <div class="user-role">...</div>
                </div>
                <i data-lucide="power" onclick="event.stopPropagation(); logout()"
                    style="color: var(--danger-red); width: 16px; height: 16px; margin-left: auto; cursor: pointer;" title="Logout"></i>
            </div>
        </aside>

        <!-- MIDDLE PANEL: Workspace -->
        <main class="workspace">
            <div class="post-container">

                <div class="sys-badge">
                    <i data-lucide="plus-square" style="width: 14px; height: 14px;"></i> Issue Creation
                </div>
                <h1 class="sys-title">Post Bounty</h1>
                <p class="sys-desc">Transmit an issue request to the active network. Detailed payloads yield faster
                    compilation closures.</p>

                <form class="terminal-form" id="requestForm" onsubmit="submitHelpRequest(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="requestTitle">Bounty Directive *</label>
                            <input type="text" id="requestTitle" class="form-input"
                                placeholder="> e.g., Implement QuickSort Algorithm in Python" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="helpType">Classification Type *</label>
                            <select id="helpType" class="form-select" required>
                                <option value="" disabled selected>> Select operational domain...</option>
                                <option value="Notes">SYS_NOTES / Notes & Summaries</option>
                                <option value="Tech Help">TECH_HUNT / Code Debugging & Implementation</option>
                                <option value="Tutoring">TUTORIAL / Live Session Walkthrough</option>
                                <option value="Other">MISC / Other Academic Directive</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="requestDesc">Payload / Stack Trace *</label>
                            <textarea id="requestDesc" class="form-textarea"
                                placeholder="> Provide full context. What have you tried so far? What is the expected output?"
                                required></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="window.location.href='my-requests.html'">Abort
                            Process</button>
                        <button type="submit" class="btn-submit" id="submitBtn">
                            <i data-lucide="upload" style="width: 16px; height: 16px;"></i> Publish Bounty
                        </button>
                    </div>
                </form>

            </div>
        </main>
    </div>

    <script src="../js/request-help.js"></script>
   <script>

async function submitHelpRequest(event){

event.preventDefault()

const btn = document.getElementById("submitBtn")
const originalText = btn.innerHTML
btn.innerHTML = "Publishing..."
btn.disabled = true

const title = document.getElementById("requestTitle").value.trim()
const description = document.getElementById("requestDesc").value.trim()

let email = ""
const userStr = localStorage.getItem("loggedInUser")
if (userStr) {
    try {
        const user = JSON.parse(userStr)
        email = user.email || user.first_name || ""
    } catch(e) { console.error("Failed to parse loggedInUser:", e) }
}

if (!email) {
    alert("You must be logged in to post a request.")
    btn.innerHTML = originalText
    btn.disabled = false
    return
}

try {
    const response = await fetch("http://127.0.0.1:5000/post_request", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: title, description: description, email: email, bounty: 50 })
    })

    if (!response.ok) {
        const errData = await response.json().catch(() => ({}))
        const errMsg = errData.error || errData.message || ("HTTP " + response.status)
        alert("Failed to post request: " + errMsg)
        btn.innerHTML = originalText
        btn.disabled = false
        return
    }

    const data = await response.json()
    alert(data.message || "Request posted successfully!")
    window.location.href = "dashboard.html"

} catch (error) {
    console.error("post_request fetch error:", error)
    alert("Network error — could not reach backend. Is the Flask server running?")
    btn.innerHTML = originalText
    btn.disabled = false
}

}

</script>


    <script>
        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "../index.html";
        }

        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const name = user.first_name || user.name || (user.email ? user.email.split("@")[0] : "User");
                    const email = user.email || "user@system.node";
                    
                    document.querySelectorAll('.user-name').forEach(el => el.innerText = name);
                    document.querySelectorAll('.user-avatar').forEach(el => el.innerText = name.charAt(0).toUpperCase());
                    document.querySelectorAll('.user-role').forEach(el => el.innerText = email);
                } catch(e) {}
            }
        });
    </script>
</body>


</html>
