<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNT MODE | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <div id="sidebar-root"></div>

        <!-- MIDDLE PANEL: Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <h1 class="workspace-title"><i data-lucide="crosshair" style="width: 28px; height: 28px;"></i> Hunt
                    Mode: Active Requests</h1>
                <div class="workspace-actions">
                    <button class="btn-icon-sys" onclick="location.reload()" title="Refresh Scan"><i
                            data-lucide="rotate-cw" style="width: 18px; height: 18px;"></i></button>
                    <button class="btn-icon-sys"><i data-lucide="filter"
                            style="width: 18px; height: 18px;"></i></button>
                </div>
            </header>

            <div class="workspace-content">
                <div class="hunt-grid" id="helpRequestsContainer">
                    <!-- Cards will be populated here via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for viewing request details -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeRequestModal()">&times;</span>
            <h2 id="modalTitle">Request Title</h2>
            <div id="modalDetails"></div>
        </div>
    </div>


    <script>
        lucide.createIcons();

        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "../index.html";
        }


        function closeRequestModal() {
            document.getElementById("requestModal").style.display = "none";
        }

        window.onclick = function (event) {
            const modal = document.getElementById("requestModal");
            if (event.target === modal) {
                modal.style.display = "none";
            }
        };


        window.currentRequests = [];

        async function loadHuntMode() {
            try {
                const res = await fetch("http://127.0.0.1:5000/get_requests");
                if (!res.ok) throw new Error("Network response was not ok");
                const data = await res.json();
                window.currentRequests = data;

                const container = document.getElementById("helpRequestsContainer");
                container.innerHTML = "";

                if (!data || data.length === 0) {
                    container.innerHTML = `
                <div class="empty-state">
                    <i data-lucide="radar"></i>
                    <h2>No Signals Found</h2>
                    <p>Network scan clear. Check back later for active bounties.</p>
                </div>
            `;
                    return;
                }

                data.forEach(req => {
                    container.innerHTML += `
            <div class="bounty-card">
                <div class="bounty-header">
                    <div>
                        <div class="bounty-type">Programming</div>
                        <div class="bounty-title">${req.title}</div>
                    </div>
                </div>
                <p class="bounty-desc">${req.description}</p>
                <div class="bounty-meta">
                    <span class="status-badge pending" style="cursor:pointer;" onclick="window.location.href='request-details.html?id=${req.id}'">
                        <i data-lucide="clock" style="width:12px;height:12px;"></i>
                        OPEN
                    </span>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-view" onclick="inspectRequest(${req.id})">INSPECT</button>
                        <button id="cap-btn-${req.id}" class="btn-hunt" onclick="captureRequest(${req.id})">CAPTURE</button>
                    </div>
                </div>
            </div>
            `;
                });
                lucide.createIcons();
            } catch (e) {
                console.error("Failed to load requests", e);
            }
        }

        function inspectRequest(id) {
            const req = window.currentRequests.find(r => r.id === id);
            if (!req) return;
            const modal = document.getElementById("requestModal");
            document.getElementById("modalTitle").innerHTML = `<i data-lucide="file-search" style="display:inline; color: var(--danger-red);"></i> ${req.title}`;
            document.getElementById("modalDetails").innerHTML = `
        <p><strong>Poster Email:</strong> ${req.email}</p>
        <p><strong>Bounty:</strong> ${req.bounty || 0} PTS</p>
        <p><strong>Log Entry:</strong><br><br> ${req.description}</p>
    `;
            lucide.createIcons();
            modal.style.display = "block";
        }

        async function captureRequest(id) {
            const userStr = localStorage.getItem("loggedInUser");
            if (!userStr) {
                alert("Please login first");
                return;
            }
            const email = JSON.parse(userStr).email;
            const btn = document.getElementById("cap-btn-" + id);
            if (btn) btn.innerText = "Capturing...";

            try {
                const res = await fetch("http://127.0.0.1:5000/accept_post", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ post_id: id, email: email })
                });
                if (res.ok) {
                    if (btn) {
                        btn.innerText = "Captured";
                        btn.disabled = true;
                        btn.style.opacity = "0.5";
                        btn.style.cursor = "not-allowed";
                    }
                    alert("Success! Request captured.");
                } else {
                    alert("Failed to capture: " + res.status);
                    if (btn) btn.innerText = "CAPTURE";
                }
            } catch (e) {
                alert("Error capturing request");
                if (btn) btn.innerText = "CAPTURE";
            }
        }

        loadHuntMode()

    </script>

    

    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderSidebar({
                activePage: 'help-others',
                context: 'app'
            });
        });
    </script>
</body>


</html>
