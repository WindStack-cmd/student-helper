<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWORK LEDGER | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div class="ambient-text">LEDGER</div>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <div id="sidebar-root"></div>

        <!-- MIDDLE PANEL: Split Architecture -->
        <main class="workspace">

            <!-- LEFT: Hero & Spotlight -->
            <div class="board-hero">
                <h1 class="page-title">Sys<br>Ledger</h1>

                <div class="time-filters">
                    <button class="filter-btn active">Genesis</button>
                    <button class="filter-btn">Cycle 03</button>
                    <button class="filter-btn">Cycle 04</button>
                </div>

                <!-- Spotlight -> The current #1 -->
                <div class="spotlight-card">
                    <div class="spotlight-badge">APEX NODE</div>
                    <div class="spotlight-user">
                        <div class="spotlight-avatar"><i data-lucide="zap"></i></div>
                        <div class="spotlight-info">
                            <h3>John Doe</h3>
                            <p>Computer Science '24</p>
                        </div>
                    </div>
                    <div class="spotlight-stats">
                        <div class="stat-block">
                            <span class="label">Reputation</span>
                            <span class="val highlight">3,250</span>
                        </div>
                        <div class="stat-block">
                            <span class="label">Bounties Claimed</span>
                            <span class="val">128</span>
                        </div>
                        <div class="stat-block" style="grid-column: span 2; margin-top: 12px;">
                            <span class="label">Core Directives</span>
                            <span
                                style="display:inline-block; padding: 4px 8px; border: 1px solid var(--border-dim); background: rgba(255,255,255,0.05); color: var(--text-primary); font-family: var(--font-mono); font-size: 0.70rem; border-radius: 4px; font-weight: 700;">REACT</span>
                            <span
                                style="display:inline-block; padding: 4px 8px; border: 1px solid var(--border-dim); background: rgba(255,255,255,0.05); color: var(--text-primary); font-family: var(--font-mono); font-size: 0.70rem; border-radius: 4px; font-weight: 700; margin-left: 4px;">SYS_ARCH</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: The Rankings List -->
            <div class="board-list">

                <!-- Contextual Banner: Where the user stands -->
                <div class="user-status-banner">
                    <div class="user-status-left">
                        <div class="my-rank">#1245</div>
                        <div class="user-status-text">
                            <h4>Target Acquired</h4>
                            <p>Top 5% bracket. Need 120 REP to compile next node tier.</p>
                        </div>
                    </div>
                    <div>
                        <button class="btn-hunt" onclick="location.href='help-others.html'">
                            Enter Hunt Mode <i data-lucide="crosshair" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                </div>

                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Node ID</th>
                            <th style="text-align: right;">Reputation</th>
                            <th style="text-align: right;">Patches</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        

                        
                    </tbody>
                </table>

                <button class="btn-load-more">Scan More Nodes...</button>

            </div>
        </main>
    </div>

    <div class="workspace-panel">

<div id="leaderboardContainer"></div>

</div>
 
<script>
lucide.createIcons();

async function loadLeaderboard() {
    const tbody = document.getElementById("leaderboardBody") || document.querySelector("tbody");
    if(!tbody) return;
    
    const fallbackHTML = tbody.innerHTML;

    try {
        const res = await fetch("http://127.0.0.1:5000/leaderboard");
        if (!res.ok) {
            throw new Error("HTTP Status " + res.status);
        }
        const data = await res.json();
        
        tbody.innerHTML = "";

        data.forEach((user, index) => {
            const initials = user.first_name ? user.first_name.charAt(0).toUpperCase() : "U";
            const row = document.createElement("tr");
            row.className = "ranking-row";

            row.innerHTML = `
                <td><div class="row-rank">#${String(index + 1).padStart(2, "0")}</div></td>
                <td>
                    <div class="row-user">
                        <div class="row-avatar">${initials}</div>
                        <div class="row-name">${user.first_name || user.email.split('@')[0]}</div>
                    </div>
                </td>
                <td class="row-rep">${user.reputation || 0} <span>REP</span></td>
                <td>
                    <div class="row-badges">
                        <div class="b-icon"><i data-lucide="${index === 0 ? 'award' : 'check'}"></i></div>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });

        lucide.createIcons();

    } catch (err) {
        console.error("Leaderboard error:", err);
        if (tbody && tbody.innerHTML === "") {
            tbody.innerHTML = fallbackHTML || `
                <tr class="ranking-row">
                    <td><div class="row-rank">#01</div></td>
                    <td><div class="row-user"><div class="row-avatar">X</div><div class="row-name">STATIC FALLBACK</div></div></td>
                    <td class="row-rep">999 <span>REP</span></td>
                    <td><div class="row-badges"><div class="b-icon"><i data-lucide="award"></i></div></div></td>
                </tr>
            `;
            lucide.createIcons();
        }
    }
}

loadLeaderboard()
</script>

<script>

const user = JSON.parse(localStorage.getItem("loggedInUser"))

if(user){

    const avatar = document.getElementById("sidebarAvatar")
    const username = document.getElementById("sidebarName")

    if(avatar){
        avatar.innerText = user.first_name.charAt(0).toUpperCase()
    }

    if(username){
        username.innerText = user.first_name
    }

}else{
    window.location.href = "login.html"
}
</script>

    

    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderSidebar({
                activePage: 'leaderboard',
                context: 'app'
            });
        });
    </script>
</body>


</html>
