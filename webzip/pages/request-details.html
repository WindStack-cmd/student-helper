<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Details</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<h1>Request Details</h1>

<div id="requestContainer"></div>

<br>

<h2>Answers</h2>

<div id="answersContainer"></div>

<br>

<h3>Post Answer</h3>

<textarea id="answerText" rows="6" cols="60" placeholder="Write your answer here"></textarea>

<br><br>

<button onclick="postAnswer()">Submit Answer</button>

<script>

const urlParams = new URLSearchParams(window.location.search)
const requestId = urlParams.get("id")

// ---------------------
// Load Request
// ---------------------

async function loadRequest(){

const response = await fetch("http://127.0.0.1:5000/get_requests")
const data = await response.json()

const container = document.getElementById("requestContainer")

data.forEach(req => {

if(req.id == requestId){

container.innerHTML = `

<h2>${req.title}</h2>

<p>${req.description}</p>

<p>Posted by: ${req.email}</p>

`

}

})

}

loadRequest()

// ---------------------
// Load Answers
// ---------------------

async function loadAnswers(){

const response = await fetch("http://127.0.0.1:5000/get_answers/"+requestId)

const data = await response.json()

const container = document.getElementById("answersContainer")

container.innerHTML=""

data.forEach(ans => {

container.innerHTML += `

<div style="border:1px solid #ccc;padding:10px;margin-bottom:10px">

<p>${ans.answer}</p>

<p>By: ${ans.email}</p>

<button onclick="acceptAnswer(${ans.id}, ${ans.request_id}, '${ans.email}')">
Accept Answer
</button>

</div>

`

})

}

loadAnswers()

// ---------------------
// Post Answer
// ---------------------

async function postAnswer(){

const answer = document.getElementById("answerText").value

const email = localStorage.getItem("email")

const response = await fetch("http://127.0.0.1:5000/post_answer",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
request_id:requestId,
answer:answer,
email:email
})

})

const data = await response.json()

alert(data.message)

document.getElementById("answerText").value=""

loadAnswers()

}

// ---------------------
// Accept Answer
// ---------------------

async function acceptAnswer(answerId,requestId,email){

const response = await fetch("http://127.0.0.1:5000/accept_answer",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
answer_id:answerId,
request_id:requestId,
email:email
})

})

const data = await response.json()

alert(data.message)

loadAnswers()

}

</script>
<script>

const name = localStorage.getItem("firstName")
const email = localStorage.getItem("userEmail")

if(name){

const avatar = document.getElementById("sidebarAvatar")
const username = document.getElementById("sidebarName")

if(avatar){
avatar.innerText = name.charAt(0).toUpperCase()
}

if(username){
username.innerText = name
}

}

</script>
</body>
