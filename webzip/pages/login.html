<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH.GATEWAY | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>
    <div class="ambient-text">AUTH</div>

    <div id="app">
        <!-- LEFT PANEL: Authentication Form -->
        <aside class="auth-sidebar">
            <header class="auth-header">
                <a href="../index.html" class="brand">
                    <div class="brand-icon">
                        <i data-lucide="terminal" style="width: 20px; height: 20px;"></i>
                    </div>
                    <div class="brand-name">StudentsHelper</div>
                </a>
            </header>

            <div class="auth-content">
                <h1 class="auth-title">Init<br>Session</h1>
                <p class="auth-subtitle">IDENTIFY ENDPOINT TO ACCESS WORKSPACE</p>

                <div id="messageContainer" class="message"></div>

                <div class="social-buttons">
                    <button class="btn-social">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="currentColor"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="currentColor"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="currentColor"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Google
                    </button>
                    <button class="btn-social">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                        </svg>
                        GitHub
                    </button>
                </div>

                <div class="auth-divider">Or Execute Manual Auth</div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">
                            Target Identity
                        </label>
                        <div class="input-wrapper">
                            <i data-lucide="fingerprint" class="input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="user@university.edu" required
                                autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="form-label">
                            <label for="password">Security Key</label>
                            <a href="forgot-password.html" class="forgot-link">Recover Key</a>
                        </div>
                        <div class="input-wrapper">
                            <i data-lucide="key" class="input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required
                                autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="loginBtn">
                        <i data-lucide="log-in" style="width: 18px; height: 18px;"></i> Execute Login
                    </button>
                </form>

                <div class="auth-footer">
                    Missing credentials? <a href="register.html">Request access token</a>
                </div>
            </div>
        </aside>

        <!-- RIGHT PANEL: Visual Canvas -->
        <main class="canvas">
            <div class="graphic-container">
                <div class="graphic-core">
                    <i data-lucide="cpu"></i>
                </div>
            </div>

            <div class="status-badge">
                <div class="label">Network Status</div>
                <div class="value"><span class="live-dot"></span> SECURE & ONLINE</div>
            </div>
        </main>
    </div>

   <script>

lucide.createIcons();

// Password toggle
function togglePassword() {
    const passInput = document.getElementById('password');
    const icon = document.querySelector('.password-toggle i');

    if (passInput.type === 'password') {
        passInput.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
    } else {
        passInput.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
    }

    lucide.createIcons();
}


// REAL LOGIN SYSTEM
document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault()

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const btn = document.getElementById("loginBtn")
const msg = document.getElementById("messageContainer")

btn.innerHTML = "Authenticating..."

try{

const response = await fetch("http://127.0.0.1:5000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

const data = await response.json()

msg.style.display="flex"

if(data.message === "Login successful"){

msg.className="message success"
msg.innerHTML="ACCESS GRANTED"


// SAVE USER EMAIL
localStorage.setItem("loggedInUser", JSON.stringify({
    email: data.email,
    first_name: data.first_name
}))

console.log("Saved user:", localStorage.getItem("loggedInUser"))

setTimeout(()=>{
window.location.href="dashboard.html"
},1000)

}else{

msg.className="message error"
msg.innerHTML="INVALID EMAIL OR PASSWORD"

}

}catch(error){

msg.style.display="flex"
msg.className="message error"
msg.innerHTML="SERVER ERROR"

}

btn.innerHTML="Execute Login"

})

</script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const name = user.first_name || user.name || "User";
                    const email = user.email || "user@system.node";
                    
                    document.querySelectorAll('.user-name').forEach(el => el.innerText = name);
                    document.querySelectorAll('.user-avatar').forEach(el => el.innerText = name.charAt(0).toUpperCase());
                    document.querySelectorAll('.user-role').forEach(el => el.innerText = email);
                } catch(e) {}
            }
        });
    </script>
</body>


</html>
