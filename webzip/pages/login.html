<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH.GATEWAY | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #030305;
            --bg-surface: #0a0a0e;
            --bg-elevated: #111118;

            --text-primary: #ffffff;
            --text-secondary: #84849a;
            --text-tertiary: #4a4a5e;

            --accent-lime: #ccff00;
            --accent-purple: #7b42fa;
            --accent-blue: #00e5ff;

            --border-dim: rgba(255, 255, 255, 0.05);
            --border-bright: rgba(255, 255, 255, 0.15);

            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --danger-red: #ff3366;
            --success-green: #ccff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Abstract ambient overlay */
        .ambient-text {
            position: fixed;
            bottom: -5%;
            right: -5%;
            font-family: var(--font-display);
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.015);
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
            letter-spacing: -0.05em;
            line-height: 0.8;
            text-align: right;
        }

        /* ----- LEFT PANEL: AUTH FORM ----- */
        .auth-sidebar {
            width: 500px;
            height: 100%;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .auth-header {
            padding: 32px 48px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-dim);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--text-primary);
            color: var(--bg-base);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .brand:hover .brand-icon {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent-lime);
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        /* Form Area */
        .auth-content {
            flex: 1;
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 40px;
            line-height: 1.5;
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
        }

        /* Social Auth */
        .social-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-social:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .btn-social img,
        .btn-social svg {
            width: 18px;
            height: 18px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 32px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-dim);
        }

        .auth-divider:not(:empty)::before {
            margin-right: 16px;
        }

        .auth-divider:not(:empty)::after {
            margin-left: 16px;
        }


        /* Form Inputs */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .forgot-link {
            color: var(--accent-purple);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .forgot-link:hover {
            color: var(--text-primary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-tertiary);
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 16px 16px 16px 48px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--text-primary);
            background: transparent;
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            background: var(--text-primary);
            color: var(--bg-base);
            border: 1px solid var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: var(--accent-lime);
            border-color: var(--accent-lime);
            box-shadow: 4px 4px 0 rgba(204, 255, 0, 0.2);
            transform: translateY(-2px);
        }

        .auth-footer {
            margin-top: 32px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            margin-left: 4px;
            transition: color 0.2s ease;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 2px;
        }

        .auth-footer a:hover {
            color: var(--accent-lime);
            border-color: var(--accent-lime);
        }

        /* Message feedback */
        .message {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 32px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid;
            animation: slideIn 0.3s ease;
        }

        .message.error {
            display: flex;
            background: rgba(255, 51, 102, 0.1);
            border-color: rgba(255, 51, 102, 0.3);
            color: var(--danger-red);
        }

        .message.success {
            display: flex;
            background: rgba(204, 255, 0, 0.1);
            border-color: rgba(204, 255, 0, 0.3);
            color: var(--success-green);
        }

        /* ----- RIGHT PANEL: VISUAL CANVAS ----- */
        .canvas {
            flex: 1;
            position: relative;
            background: var(--bg-base);
            display: flex;
            padding: 64px;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        /* Ambient scanline/grid background */
        .canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background-size: 4px 4px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            z-index: 0;
            pointer-events: none;
        }

        /* Giant abstract graphic */
        .graphic-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            border: 1px solid var(--border-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .graphic-container::before {
            content: '';
            position: absolute;
            inset: 40px;
            border: 1px dashed var(--border-bright);
            border-radius: 50%;
            animation: rotateSlow 40s linear infinite;
        }

        .graphic-core {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .graphic-core i {
            width: 64px;
            height: 64px;
            color: var(--bg-base);
            background: var(--text-primary);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 0 40px var(--accent-purple);
        }

        .status-badge {
            position: absolute;
            bottom: 64px;
            left: 64px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-dim);
            padding: 16px 24px;
            border-radius: 12px;
            font-family: var(--font-mono);
            z-index: 2;
        }

        .status-badge .label {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .status-badge .value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-lime);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-lime);
            animation: pulse 2s infinite;
        }

        /* Animations */
        @keyframes rotateSlow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.5);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .canvas {
                display: none;
            }

            .auth-sidebar {
                width: 100%;
                border-right: none;
                align-items: center;
            }

            .auth-header {
                width: 100%;
                max-width: 500px;
            }

            .auth-content {
                width: 100%;
                max-width: 500px;
                padding: 32px 48px;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-text">AUTH</div>

    <div id="app">
        <!-- LEFT PANEL: Authentication Form -->
        <aside class="auth-sidebar">
            <header class="auth-header">
                <a href="../index.html" class="brand">
                    <div class="brand-icon">
                        <i data-lucide="terminal" style="width: 20px; height: 20px;"></i>
                    </div>
                    <div class="brand-name">StudentsHelper</div>
                </a>
            </header>

            <div class="auth-content">
                <h1 class="auth-title">Init<br>Session</h1>
                <p class="auth-subtitle">IDENTIFY ENDPOINT TO ACCESS WORKSPACE</p>

                <div id="messageContainer" class="message"></div>

                <div class="social-buttons">
                    <button class="btn-social">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="currentColor"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="currentColor"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="currentColor"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Google
                    </button>
                    <button class="btn-social">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                        </svg>
                        GitHub
                    </button>
                </div>

                <div class="auth-divider">Or Execute Manual Auth</div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">
                            Target Identity
                        </label>
                        <div class="input-wrapper">
                            <i data-lucide="fingerprint" class="input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="user@university.edu" required
                                autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="form-label">
                            <label for="password">Security Key</label>
                            <a href="forgot-password.html" class="forgot-link">Recover Key</a>
                        </div>
                        <div class="input-wrapper">
                            <i data-lucide="key" class="input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required
                                autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                                <i data-lucide="eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="loginBtn">
                        <i data-lucide="log-in" style="width: 18px; height: 18px;"></i> Execute Login
                    </button>
                </form>

                <div class="auth-footer">
                    Missing credentials? <a href="register.html">Request access token</a>
                </div>
            </div>
        </aside>

        <!-- RIGHT PANEL: Visual Canvas -->
        <main class="canvas">
            <div class="graphic-container">
                <div class="graphic-core">
                    <i data-lucide="cpu"></i>
                </div>
            </div>

            <div class="status-badge">
                <div class="label">Network Status</div>
                <div class="value"><span class="live-dot"></span> SECURE & ONLINE</div>
            </div>
        </main>
    </div>

   <script>

lucide.createIcons();

// Password toggle
function togglePassword() {
    const passInput = document.getElementById('password');
    const icon = document.querySelector('.password-toggle i');

    if (passInput.type === 'password') {
        passInput.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
    } else {
        passInput.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
    }

    lucide.createIcons();
}


// REAL LOGIN SYSTEM
document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault()

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const btn = document.getElementById("loginBtn")
const msg = document.getElementById("messageContainer")

btn.innerHTML = "Authenticating..."

try{

const response = await fetch("http://127.0.0.1:5000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

const data = await response.json()

msg.style.display="flex"

if(data.message === "Login successful"){

msg.className="message success"
msg.innerHTML="ACCESS GRANTED"


// SAVE USER EMAIL
localStorage.setItem("loggedInUser", JSON.stringify({
    email: data.email,
    first_name: data.first_name
}))

console.log("Saved user:", localStorage.getItem("loggedInUser"))

setTimeout(()=>{
window.location.href="dashboard.html"
},1000)

}else{

msg.className="message error"
msg.innerHTML="INVALID EMAIL OR PASSWORD"

}

}catch(error){

msg.style.display="flex"
msg.className="message error"
msg.innerHTML="SERVER ERROR"

}

btn.innerHTML="Execute Login"

})

</script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const name = user.first_name || user.name || "User";
                    const email = user.email || "user@system.node";
                    
                    document.querySelectorAll('.user-name').forEach(el => el.innerText = name);
                    document.querySelectorAll('.user-avatar').forEach(el => el.innerText = name.charAt(0).toUpperCase());
                    document.querySelectorAll('.user-role').forEach(el => el.innerText = email);
                } catch(e) {}
            }
        });
    </script>
</body>


</html>
