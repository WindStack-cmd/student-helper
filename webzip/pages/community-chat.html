<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWORK.FEED | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <div id="sidebar-root"></div>

        <!-- MIDDLE PANEL: Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <h1 class="workspace-title">Sys.Network_Feed</h1>
                <div class="workspace-actions">
                    <button class="btn-icon"><i data-lucide="search" style="width: 18px; height: 18px;"></i></button>
                    <a href="request-help.html" style="text-decoration: none;" class="btn-primary">
                        <i data-lucide="zap" style="width: 16px; height: 16px;"></i>
                        Broadcast Post
                    </a>
                </div>
            </header>

            <div class="workspace-content" id="chatMessages">
                <!-- Composer Box -->
                <div class="post-composer">

                
                    <textarea id="chatInput" class="composer-input" rows="2"
                        placeholder="Initiate network broadcast... Describe your query or share data."></textarea>
                    <div class="composer-actions">
                        <div class="composer-tools">
                            <button class="tool-btn"><i data-lucide="code"
                                    style="width: 18px; height: 18px;"></i></button>
                            <button class="tool-btn"><i data-lucide="paperclip"
                                    style="width: 18px; height: 18px;"></i></button>
                            <button class="tool-btn"><i data-lucide="smile"
                                    style="width: 18px; height: 18px;"></i></button>
                        </div>

                         <!-- DYNAMIC POSTS WILL COME HERE -->
                         <div id="postsContainer"></div>

                        <button onclick="sendMessage()" class="btn-primary" style="height: 36px; font-size: 0.75rem;">Transmit</button>
                    </div>
                </div>

                

                <!-- Loading Marker -->
                <div
                    style="text-align: center; font-family: var(--font-mono); color: var(--text-tertiary); font-size: 0.8rem; text-transform: uppercase; margin-top: 24px;">
                    <i data-lucide="loader-2"
                        style="width: 16px; height: 16px; animation: spin 1s linear infinite; display: block; margin: 0 auto 8px;"></i>
                    Scanning Network For More Protocols...
                </div>

            </div>
        </main>

        <!-- RIGHT PANEL: Inspector Layout (Filters) -->
        <aside class="inspector-panel">
            <div class="inspector-header">
                <h3><i data-lucide="filter" style="width: 16px; height: 16px;"></i> Network Filters</h3>
            </div>

            <div class="inspector-content">
                <div class="filter-group">
                    <div class="filter-label">Sort Protocols By</div>
                    <div class="radio-options">
                        <label class="radio-option">
                            <input type="radio" name="sort" checked>
                            <span class="radio-label">Chronological (Latest)</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="sort">
                            <span class="radio-label">High Yield (Bounties)</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="sort">
                            <span class="radio-label">Network Activity (Hot)</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="sort">
                            <span class="radio-label">Unresolved</span>
                        </label>
                    </div>
                </div>

                <div class="filter-group">
                    <div class="filter-label">Data Types</div>
                    <div class="radio-options">
                        <label class="radio-option">
                            <input type="radio" name="type" checked>
                            <span class="radio-label">All Transmissions</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type">
                            <span class="radio-label">Help Requests</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type">
                            <span class="radio-label">Knowledge Sharing</span>
                        </label>
                    </div>
                </div>

                <div class="filter-group" style="margin-top: 48px;">
                    <div class="filter-label" style="display:flex; justify-content: space-between;">
                        <span>Top Nodes</span>
                        <span style="color: var(--success-green);"><i data-lucide="activity"
                                style="width: 12px; height: 12px;"></i> LIVE</span>
                    </div>

                    <div class="trending-nodes">
                        <div class="trending-node">
                            <div class="node-rank">#1</div>
                            <div class="node-pfp" style="color: var(--warning-amber);">SK</div>
                            <div class="node-info">
                                <div class="node-id">Sarah K.</div>
                                <div class="node-score">+450 PTS / Hr</div>
                            </div>
                        </div>
                        <div class="trending-node">
                            <div class="node-rank">#2</div>
                            <div class="node-pfp" style="color: var(--accent-purple);">RJ</div>
                            <div class="node-info">
                                <div class="node-id">Ryan J.</div>
                                <div class="node-score">+320 PTS / Hr</div>
                            </div>
                        </div>
                        <div class="trending-node">
                            <div class="node-rank">#3</div>
                            <div class="node-pfp" style="color: var(--accent-blue);">EM</div>
                            <div class="node-info">
                                <div class="node-id">Emma M.</div>
                                <div class="node-score">+280 PTS / Hr</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

  <script>

async function loadPosts() {
    try {
        const res = await fetch("http://127.0.0.1:5000/get_posts")
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json()

        const container = document.getElementById("postsContainer")
        container.innerHTML = ""

        data.forEach(post => {
            const initials = post.first_name ? post.first_name.split(" ").map(n => n[0]).join("").toUpperCase() : "U"
            const div = document.createElement("article")
            div.className = "feed-post"

            div.innerHTML = `
                <div class="post-header">
                    <div class="post-author">
                        <div class="author-pfp">${initials}</div>
                        <div class="author-meta">
                            <h4>${post.first_name || "User"}</h4>
                            <p>NODE • Just now</p>
                        </div>
                    </div>

                    ${post.bounty ? `
                    <div class="bounty-badge">
                        BOUNTY: ${post.bounty} PTS
                    </div>` : ``}
                </div>

                <div class="post-body">
                    <h2>${post.title || "User Post"}</h2>
                    <p>${post.content}</p>
                </div>

                <div class="post-footer">
                    <div class="interaction-group">
                        <button class="interact-btn">Replies</button>
                    </div>

                    <button class="btn-solve" onclick="acceptPost('${post.id}')">
                        Initiate Fix
                    </button>
                </div>
            `

            container.appendChild(div)
        })
    } catch(e) {
        console.error("Failed to load posts", e);
    }
}

async function sendMessage() {
    const inputStr = document.getElementById("chatInput").value;
    if (!inputStr) return;
    const userStr = localStorage.getItem("loggedInUser");
    if (!userStr) {
        alert("Please log in first");
        return;
    }
    const user = JSON.parse(userStr);

    try {
        const res = await fetch("http://127.0.0.1:5000/create_post", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: user.email, content: inputStr, bounty: 0 })
        });
        if (res.ok) {
            document.getElementById("chatInput").value = "";
            loadPosts();
        } else {
            alert("Failed to send message: " + res.status);
        }
    } catch(e) {
        alert("Error sending message");
    }
}

async function loadLeaderboard() {
    try {
        const res = await fetch("http://127.0.0.1:5000/leaderboard");
        if (!res.ok) return;
        const data = await res.json();
        const container = document.querySelector(".trending-nodes");
        if (data && data.length > 0) {
            container.innerHTML = "";
            data.slice(0, 3).forEach((u, i) => {
                const initials = u.first_name ? u.first_name.charAt(0).toUpperCase() : "U";
                const colors = ["var(--warning-amber)", "var(--accent-purple)", "var(--accent-blue)"];
                const color = colors[i] || colors[0];
                container.innerHTML += `
                    <div class="trending-node">
                        <div class="node-rank">#${i+1}</div>
                        <div class="node-pfp" style="color: ${color};">${initials}</div>
                        <div class="node-info">
                            <div class="node-id">${u.first_name || u.email.split('@')[0]}</div>
                            <div class="node-score">+${u.reputation || 0} PTS</div>
                        </div>
                    </div>
                `;
            });
        }
    } catch (e) {
        console.error("Leaderboard fetch failed", e);
    }
}

loadPosts()
loadLeaderboard()



</script>
<script>

const userStr = localStorage.getItem("loggedInUser");
if(userStr){
    try {
        const user = JSON.parse(userStr);
        const avatar = document.getElementById("sidebarAvatar");
        const username = document.getElementById("sidebarName");
        if(avatar) avatar.innerText = user.first_name.charAt(0).toUpperCase();
        if(username) username.innerText = user.first_name;
    } catch(e) {}
}

</script>

    

    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderSidebar({
                activePage: 'community',
                context: 'app'
            });
        });
    </script>
</body>


</html>
