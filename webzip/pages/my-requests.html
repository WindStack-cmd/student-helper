<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIVE BOUNTIES | StudentsHelper</title>
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <div id="sidebar-root"></div>

        <!-- MIDDLE PANEL: Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <h1 class="workspace-title"><i data-lucide="folder-open" style="width: 28px; height: 28px;"></i> Active
                    Bounties</h1>
                <div class="workspace-actions">
                    <button class="btn-icon-sys" onclick="location.reload()" title="Refresh Ledger"><i
                            data-lucide="rotate-cw" style="width: 18px; height: 18px;"></i></button>
                    <!-- Instead of modal, a direct "Broadcast" action can be tied to dashboard -->
                    <button class="btn-sys-main" onclick="location.href='dashboard.html#broadcast'">
                        <i data-lucide="plus" style="width: 16px; height: 16px;"></i>
                        Broadcast New
                    </button>
                </div>
            </header>

            <div class="workspace-content">
                <div class="log-container" id="logContainer" style="display:none;">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>Tx Hash</th>
                                <th>Bounty Data</th>
                                <th>Network State</th>
                                <th>Resolved By</th>
                            </tr>
                        </thead>
                        <tbody id="requestsContainer">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>

                <div id="emptyContainer" style="display:none;">
                    <!-- Empty state populated via JS -->
                </div>
            </div>
        </main>
    </div>
<script>
lucide.createIcons();

function logout() {
    window.location.href = "login.html";
}

const tbody = document.getElementById("requestsContainer");
const logContainer = document.getElementById("logContainer");
const emptyContainer = document.getElementById("emptyContainer");

function generatePulseHash() {
    return "0x" + Math.floor(Math.random()*16777215)
        .toString(16)
        .toUpperCase()
        .padStart(6,'0');
}


async function loadRequests(){

try{

const res = await fetch("http://127.0.0.1:5000/get_requests");

const data = await res.json();

tbody.innerHTML = "";

if(!data || data.length === 0){

emptyContainer.style.display = "block";

emptyContainer.innerHTML = `
<div class="empty-state">
<i data-lucide="hard-drive"></i>
<h2>Ledger Empty</h2>
<p>No active bounties on the network.</p>
</div>
`;

lucide.createIcons();
return;

}

logContainer.style.display = "block";

data.forEach(req => {

const tr = document.createElement("tr");

const hash = generatePulseHash();

tr.innerHTML = `
<td class="col-id">${hash}</td>

<td class="col-details">
<div class="bounty-title">${req.title}</div>

<p class="bounty-desc">
${req.description || "No description logged."}
</p>

<div style="font-family: var(--font-mono); font-size:0.75rem; color:var(--text-tertiary); margin-top:8px;">
TIMESTAMP: ${new Date().toLocaleDateString()}
</div>
</td>

<td class="col-status">
<span class="status-badge pending">
<i data-lucide="loader-2" style="width:12px;height:12px;animation:spin 2s linear infinite;"></i>
OPEN
</span>
</td>

<td class="col-claimant">
<span style="color: var(--text-tertiary); font-style: italic;">
Awaiting Claim
</span>
</td>
`;

tbody.appendChild(tr);

});

lucide.createIcons();

}

catch(error){

console.error("ERROR_LOADING_REQUESTS", error);

emptyContainer.style.display = "block";

emptyContainer.innerHTML = `
<div class="empty-state">
<i data-lucide="alert-triangle"></i>
<h2>Network Error</h2>
<p>Unable to load requests from server.</p>
</div>
`;

lucide.createIcons();

}

}

loadRequests();

</script>
    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    


    

    <script src="../js/sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderSidebar({
                activePage: 'my-requests',
                context: 'app'
            });
        });
    </script>
</body>


</html>
