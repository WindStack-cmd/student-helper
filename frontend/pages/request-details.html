<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Details | Student Helper</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #080c10;
            --surface: #0f1419;
            --surface2: #161d26;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #c6f135;
            --accent-glow: rgba(198, 241, 53, 0.25);
            --accent-dim: rgba(198, 241, 53, 0.08);
            --text: #e8edf2;
            --text-muted: #6b7a8d;
            --text-dim: #3d4f62;
            --success: #00d9a3;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(198, 241, 53, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .brand-icon {
            width: 30px;
            height: 30px;
            padding: 5px;
            background: white;
            color: black;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .brand:hover .brand-icon {
            transform: scale(1.1);
            background: var(--accent) !important;
            color: black;
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: white;
            text-transform: uppercase;
        }

        /* ── page layout ── */
        .page-layout {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 100vh;
        }

        /* ══════════════════════════════
           LEFT SIDEBAR
        ══════════════════════════════ */
        .sidebar {
            width: 290px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 18px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-logo {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .sidebar-search {
            position: relative;
            padding-top: 10px;
        }

        .sidebar-search input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 8px 12px 8px 34px;
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-search input::placeholder {
            color: var(--text-dim);
        }

        .sidebar-search input:focus {
            border-color: rgba(198, 241, 53, 0.3);
        }

        .sidebar-search svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
        }

        .sidebar-label {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 14px 18px 8px;
            flex-shrink: 0;
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 20px;
        }

        .sidebar-list::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .req-item {
            padding: 11px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            border: 1px solid transparent;
            margin-bottom: 3px;
        }

        .req-item:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        .req-item.active {
            background: var(--accent-dim);
            border-color: rgba(198, 241, 53, 0.2);
        }

        .req-item.active .req-item-title {
            color: var(--accent);
        }

        .req-item-title {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.35;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .req-item-meta {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .req-item-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        .req-item-email {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .sidebar-empty {
            padding: 32px 16px;
            text-align: center;
            font-size: 13px;
            color: var(--text-dim);
        }

        /* ══════════════════════════════
           MAIN CONTENT
        ══════════════════════════════ */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 48px 40px 80px;
            min-width: 0;
        }

        /* ── topbar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            animation: fadeUp 0.4s ease both;
        }

        .breadcrumb {
            font-size: 12px;
            color: var(--text-dim);
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        .breadcrumb span {
            color: var(--text-muted);
            font-family: Arial, Helvetica, sans-serif;
        }

        /* ── page heading ── */
        h1 {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            animation: fadeUp 0.4s 0.05s ease both;
        }

        .page-sub {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 28px;
            animation: fadeUp 0.4s 0.1s ease both;
        }

        /* ── request card ── */
        #requestContainer {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.4s 0.15s ease both;
        }

        #requestContainer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
        }

        #requestContainer h2 {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        #requestContainer p {
            font-size: 14px;
            line-height: 1.75;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        #requestContainer p+p {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        /* ── section titles ── */
        h2:not(#requestContainer h2) {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
            animation: fadeUp 0.4s 0.2s ease both;
        }

        h3 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            animation: fadeUp 0.4s 0.3s ease both;
        }

        /* ── answers ── */
        #answersContainer {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        #answersContainer>div {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            padding: 20px 22px !important;
            margin-bottom: 0 !important;
            position: relative;
            z-index: 3;
            overflow: visible;
            transition: border-color 0.2s, transform 0.2s;
            animation: fadeUp 0.35s ease both;
        }

        #answersContainer>div:hover {
            border-color: rgba(255, 255, 255, 0.13) !important;
            transform: translateY(-1px);
        }

        #answersContainer>div p {
            font-size: 14px;
            line-height: 1.75;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        #answersContainer>div p:last-of-type {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        #answersContainer>div button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent !important;
            border: 1px solid var(--border) !important;
            color: var(--text-muted) !important;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            padding: 7px 14px !important;
            border-radius: 8px !important;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0 !important;
        }

        #answersContainer>div button:hover {
            background: rgba(0, 217, 163, 0.1) !important;
            border-color: rgba(0, 217, 163, 0.4) !important;
            color: var(--success) !important;
        }

        .rating-control {
            position: relative;
            min-width: 220px;
            flex: 1;
            z-index: 20;
        }

        .rating-trigger {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(16, 21, 28, 0.98), rgba(10, 13, 18, 0.98));
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .rating-trigger:hover {
            border-color: rgba(198, 241, 53, 0.35);
            transform: translateY(-1px);
        }

        .rating-trigger:focus {
            outline: none;
            border-color: rgba(198, 241, 53, 0.5);
            box-shadow: 0 0 0 3px rgba(198, 241, 53, 0.08);
        }

        .rating-trigger .rating-trigger-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .rating-trigger .rating-trigger-icon {
            width: 14px;
            height: 14px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .rating-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            z-index: 30;
            width: 100%;
            padding: 8px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(7, 11, 15, 0.98);
            backdrop-filter: blur(14px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
            display: none;
        }

        .rating-menu.open {
            display: block;
        }

        .rating-option {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid transparent;
            border-radius: 10px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .rating-option:hover {
            background: rgba(198, 241, 53, 0.08) !important;
            border-color: rgba(198, 241, 53, 0.18) !important;
            color: var(--text) !important;
        }

        .rating-option.selected {
            background: rgba(198, 241, 53, 0.12);
            border-color: rgba(198, 241, 53, 0.22);
            color: var(--accent);
        }

        .rating-option-star {
            color: var(--warning-amber);
            font-size: 14px;
            width: 16px;
            flex-shrink: 0;
            text-align: center;
        }

        .rating-trigger-text {
            color: var(--text);
        }

        .file-upload {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-upload-label {
            font-size: 13px;
            color: var(--text-dim);
        }

        .file-upload-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .file-upload-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(16, 21, 28, 0.98), rgba(10, 13, 18, 0.98));
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .file-upload-button:hover {
            border-color: rgba(198, 241, 53, 0.35);
            transform: translateY(-1px);
        }

        .file-upload-button:focus-within {
            border-color: rgba(198, 241, 53, 0.5);
            box-shadow: 0 0 0 3px rgba(198, 241, 53, 0.08);
        }

        .file-upload-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .file-upload-name {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ── post answer box ── */
        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.4s 0.35s ease both;
        }

        .post-card-sub {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        textarea#answerText {
            width: 100% !important;
            height: 130px !important;
            background: var(--bg) !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
            color: var(--text) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 14px !important;
            line-height: 1.7 !important;
            padding: 14px 16px !important;
            resize: none !important;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none !important;
            display: block;
        }

        textarea#answerText:focus {
            border-color: rgba(198, 241, 53, 0.4) !important;
            box-shadow: 0 0 0 3px rgba(198, 241, 53, 0.07) !important;
        }

        textarea#answerText::placeholder {
            color: var(--text-dim);
        }

        button[onclick="postAnswer()"] {
            margin-top: 14px !important;
            display: inline-flex !important;
            align-items: center !important;
            background: var(--accent) !important;
            color: #080c10 !important;
            font-family: 'Syne', sans-serif !important;
            font-size: 14px !important;
            font-weight: 700 !important;
            padding: 12px 26px !important;
            border: none !important;
            border-radius: 10px !important;
            cursor: pointer !important;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s !important;
        }

        button[onclick="postAnswer()"]:hover {
            opacity: 0.9 !important;
            transform: translateY(-1px) !important;
            box-shadow: 0 8px 24px var(--accent-glow) !important;
        }

        /* ── scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .page-layout {
                flex-direction: column;
            }

            .main-content {
                padding: 28px 20px 60px;
            }
        }
    </style>
</head>

<body>

    <div class="page-layout">

        <!-- ══ LEFT SIDEBAR ══ -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="help-others.html" class="brand">
                    <div class="brand-icon">
                        <i data-lucide="arrow-big-left" style="width: 50px; height: 50px;"></i>
                    </div>
                </a>
                <div class="sidebar-search">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4" />
                        <path d="M10 10L13 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                    </svg>
                    <input type="text" id="sidebarSearch" placeholder="Search requests…"
                        oninput="filterSidebar(this.value)" />
                </div>
            </div>
            <div class="sidebar-label">All Requests</div>
            <div class="sidebar-list" id="sidebarList">
                <div class="sidebar-empty">Loading requests…</div>
            </div>
        </aside>

        <!-- ══ MAIN CONTENT ══ -->
        <div class="main-content">

            <div class="topbar">
                <div class="breadcrumb">Dashboard &nbsp;/&nbsp; <span>Request Details</span></div>
            </div>

            <h1>Request Details</h1>
            <p class="page-sub">View the full request and contribute your answer below.</p>

            <div id="requestContainer"></div>

            <br>

            <h2>Answers</h2>

            <div id="answersContainer"></div>

            <br>

            <div class="post-card">
                <h3>Post Answer</h3>
                <p class="post-card-sub">Share your knowledge and help a fellow student.</p>

                <textarea id="answerText" rows="6" cols="60" placeholder="Write your answer here" style="width:100%; box-sizing:border-box;"></textarea>

                <div class="file-upload">
                    <label class="file-upload-label" for="answerFile">Attach File (optional):</label>
                    <div class="file-upload-row">
                        <label class="file-upload-button" for="answerFile">
                            <i data-lucide="paperclip" style="width:14px;height:14px;"></i>
                            <span>Choose file</span>
                        </label>
                        <span class="file-upload-name" id="answerFileName">No file chosen</span>
                        <input type="file" id="answerFile" class="file-upload-input">
                    </div>
                </div>

                <br><br>

                <button onclick="postAnswer()" class="btn-hunt">Submit Answer</button>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>

        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search)
        const requestId = urlParams.get("id")

        // ---------------------
        // Load Request
        // ---------------------

        async function loadRequest() {

            const response = await fetch("http://127.0.0.1:5001/get_requests")
            const result = await response.json()
            const data = result.data || []

            const container = document.getElementById("requestContainer")

            data.forEach(req => {

                if (req.id == requestId) {

                    container.innerHTML = `

<h2>${req.title}</h2>

<p>${req.description}</p>

<p>Posted by: ${req.email}</p>

`

                }

            })

        }

        loadRequest()

        // ---------------------
        // Load Answers
        // ---------------------

        async function loadAnswers() {

            const response = await fetch("http://127.0.0.1:5001/get_answers/" + requestId)

            const data = await response.json()

            const container = document.getElementById("answersContainer")

            container.innerHTML = ""

            data.forEach(ans => {
                let fileLink = "";
                if (ans.file_path) {
                    fileLink = `<div style="margin-top:10px;"><a href="http://127.0.0.1:5001${ans.file_path}" target="_blank" style="color:var(--accent-blue); text-decoration:none;"><i data-lucide="paperclip" style="width:14px;height:14px;vertical-align:middle;"></i> <span style="vertical-align:middle;font-size:13px;">View Attachment</span></a></div>`;
                }

                let ratingHtml = "";
                if (ans.accepted) {
                    ratingHtml = `<span style="color:var(--warning-amber); border:1px solid; padding:2px 6px; border-radius:4px; font-size:12px; margin-left:10px;">★ Rated ${ans.rating || 0}/5</span>`;
                }

                container.innerHTML += `
<div style="border:1px solid var(--border-dim); padding:15px; margin-bottom:15px; background:var(--bg-card); border-radius:6px;">
<p style="margin-bottom:10px; line-height:1.5;">${ans.answer}</p>
${fileLink}
<p style="font-size:12px; color:var(--text-dim); margin-top:10px; margin-bottom:15px;">By: ${ans.email} ${ratingHtml}</p>

<div style="display:flex; justify-content:space-between; align-items:center;">
    ${!ans.accepted ? `
    	    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div class="rating-control" data-rating-control="${ans.id}">
            <button type="button" class="rating-trigger" id="rating-trigger-${ans.id}" onclick="toggleRatingMenu(${ans.id})">
                <span class="rating-trigger-label"><span class="rating-trigger-text" id="rating-label-${ans.id}">★ 5 (Excellent)</span></span>
                <i data-lucide="chevron-down" class="rating-trigger-icon"></i>
            </button>
            <div class="rating-menu" id="rating-menu-${ans.id}">
                <button type="button" class="rating-option selected" data-value="5" onclick="selectRating(${ans.id}, 5)"><span class="rating-option-star">★</span><span>5 (Excellent)</span></button>
                <button type="button" class="rating-option" data-value="4" onclick="selectRating(${ans.id}, 4)"><span class="rating-option-star">★</span><span>4 (Good)</span></button>
                <button type="button" class="rating-option" data-value="3" onclick="selectRating(${ans.id}, 3)"><span class="rating-option-star">★</span><span>3 (Okay)</span></button>
                <button type="button" class="rating-option" data-value="2" onclick="selectRating(${ans.id}, 2)"><span class="rating-option-star">★</span><span>2 (Poor)</span></button>
                <button type="button" class="rating-option" data-value="1" onclick="selectRating(${ans.id}, 1)"><span class="rating-option-star">★</span><span>1 (Terrible)</span></button>
            </div>
            <input type="hidden" id="rating-${ans.id}" value="5">
        </div>
        <button class="btn-hunt" onclick="acceptAnswer(${ans.id}, ${ans.request_id}, '${ans.email}')">
            Approve Answer
        </button>
    </div>
    ` : `<span style="color:var(--success-green);font-size:13px;font-weight:bold; letter-spacing:0.5px;">✔ APPROVED</span>`}

    <button class="btn-view" onclick="upvoteAnswer(${ans.id}, this)">
        <i data-lucide="thumbs-up" style="width:14px;height:14px;vertical-align:middle;"></i> Upvote (${ans.upvotes || 0})
    </button>
</div>
</div>
`
            });
            lucide.createIcons();
        }
            
        async function upvoteAnswer(answerId, btnElement) {
            const originalText = btnElement.innerHTML;
            btnElement.innerHTML = "Voting...";
            btnElement.disabled = true;

            try {
                const response = await fetch("http://127.0.0.1:5001/upvote_answer", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + localStorage.getItem("access_token")
                    },
                    body: JSON.stringify({ answer_id: answerId })
                });
                
                if (!response.ok) throw new Error("Failed to upvote");
                
                loadAnswers();
            } catch (e) {
                console.error(e);
                alert("Failed to upvote");
                btnElement.innerHTML = originalText;
                btnElement.disabled = false;
            }

        }

        function closeRatingMenus(exceptId = null) {
            document.querySelectorAll('.rating-menu.open').forEach(menu => {
                const menuId = menu.id.replace('rating-menu-', '');
                if (exceptId !== null && String(exceptId) === menuId) {
                    return;
                }
                menu.classList.remove('open');
            });
        }

        function toggleRatingMenu(answerId) {
            const menu = document.getElementById(`rating-menu-${answerId}`);
            if (!menu) return;

            const willOpen = !menu.classList.contains('open');
            closeRatingMenus(answerId);
            if (willOpen) {
                menu.classList.add('open');
            }
        }

        function selectRating(answerId, rating) {
            const menu = document.getElementById(`rating-menu-${answerId}`);
            const hiddenInput = document.getElementById(`rating-${answerId}`);
            const label = document.getElementById(`rating-label-${answerId}`);

            if (hiddenInput) {
                hiddenInput.value = String(rating);
            }

            if (label) {
                const labelMap = {
                    5: '★ 5 (Excellent)',
                    4: '★ 4 (Good)',
                    3: '★ 3 (Okay)',
                    2: '★ 2 (Poor)',
                    1: '★ 1 (Terrible)'
                };
                label.textContent = labelMap[rating] || '★ 5 (Excellent)';
            }

            if (menu) {
                menu.querySelectorAll('.rating-option').forEach(option => {
                    option.classList.toggle('selected', option.dataset.value === String(rating));
                });
                menu.classList.remove('open');
            }
        }

        document.addEventListener('click', function(event) {
            const control = event.target.closest('.rating-control');
            if (!control) {
                closeRatingMenus();
            }
        });

        const answerFileInput = document.getElementById('answerFile');
        const answerFileName = document.getElementById('answerFileName');
        if (answerFileInput && answerFileName) {
            answerFileInput.addEventListener('change', function() {
                answerFileName.textContent = this.files && this.files.length ? this.files[0].name : 'No file chosen';
            });
        }

        loadAnswers()

        // ---------------------
        // Post Answer
        // ---------------------

        async function postAnswer() {

            const answer = document.getElementById("answerText").value.trim()

            // Validate request ID
            if (!requestId) {
                alert("ERROR: Request ID not found! Please reload the page.")
                return
            }

            // Validate answer length (backend requires min 5 chars)
            if (!answer || answer.length < 5) {
                alert("Answer must be at least 5 characters long!")
                return
            }

            // Get email from correct localStorage key
            const userStr = localStorage.getItem("loggedInUser")
            if (!userStr) {
                alert("You must be logged in!")
                return
            }

            const user = JSON.parse(userStr)
            const email = user.email

            if (!email) {
                alert("ERROR: Email not found in profile!")
                return
            }

            // Get JWT token
            const token = localStorage.getItem("access_token")
            if (!token) {
                alert("Authentication token missing. Please login again!")
                return
            }

            // Debug log
            console.log("Posting answer:", { request_id: parseInt(requestId), answer, email })

            const formData = new FormData();
            formData.append('request_id', parseInt(requestId));
            formData.append('answer', answer);
            formData.append('email', email);

            const fileInput = document.getElementById("answerFile");
            if (fileInput && fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }

            try {
                const response = await fetch("http://127.0.0.1:5001/post_answer", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`
                    },
                    body: formData
                })

                // Check for errors
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}))
                    const errorMsg = errorData.message || errorData.error_code || `HTTP ${response.status}`
                    console.error("Server error:", errorData)
                    alert(`ERROR: ${errorMsg}`)
                    return
                }

                const data = await response.json()

                alert(data.message || "Answer posted successfully!")

                document.getElementById("answerText").value = ""

                loadAnswers()

            } catch (error) {
                console.error("Post answer error:", error)
                alert("Network error: Could not post answer")
            }

        }

        // ---------------------
        // Accept Answer
        // ---------------------

        async function acceptAnswer(answerId, requestIdParam, email) {

            if (!answerId || !requestIdParam) {
                alert("ERROR: Answer ID or Request ID missing!")
                return
            }

            const token = localStorage.getItem("access_token")
            if (!token) {
                alert("Authentication token missing. Please login again!")
                return
            }

            let ratingVal = 5;
            const ratingInput = document.getElementById('rating-' + answerId);
            if (ratingInput) {
                ratingVal = parseInt(ratingInput.value) || 5;
            }

            try {
                const response = await fetch("http://127.0.0.1:5001/accept_answer", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },

                    body: JSON.stringify({
                        answer_id: parseInt(answerId),
                        request_id: parseInt(requestIdParam),
                        email: email,
                        rating: ratingVal
                    })

                })

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}))
                    const errorMsg = errorData.message || errorData.error_code || `HTTP ${response.status}`
                    console.error("Server error:", errorData)
                    alert(`ERROR: ${errorMsg}`)
                    return
                }

                const data = await response.json()

                alert(data.message || "Answer accepted!")

                loadAnswers()

            } catch (error) {
                console.error("Accept answer error:", error)
                alert("Network error: Could not accept answer")
            }

        }

    </script>

    <!-- ══════════════════════════════════════════════════
     ORIGINAL SCRIPT 2 — NOT CHANGED, NOT TOUCHED
══════════════════════════════════════════════════ -->
    <script>
        const name = localStorage.getItem("firstName")
        const email = localStorage.getItem("userEmail")

        if (name) {

            const avatar = document.getElementById("sidebarAvatar")
            const username = document.getElementById("sidebarName")

            if (avatar) {
                avatar.innerText = name.charAt(0).toUpperCase()
            }

            if (username) {
                username.innerText = name
            }

        }
    </script>

    <!-- ══════════════════════════════════════════════════
     NEW SIDEBAR SCRIPT — BRAND NEW, SEPARATE
══════════════════════════════════════════════════ -->
    <script>
        let allRequests = []

        async function loadSidebar() {
            try {
                const res = await fetch("http://127.0.0.1:5001/get_requests")
                const result = await res.json()
                allRequests = result.data || []
                renderSidebar(allRequests)
            } catch (e) {
                document.getElementById("sidebarList").innerHTML =
                    '<div class="sidebar-empty">Could not load requests.</div>'
            }
        }

        function renderSidebar(requests) {
            const list = document.getElementById("sidebarList")
            if (!requests.length) {
                list.innerHTML = '<div class="sidebar-empty">No requests found.</div>'
                return
            }
            list.innerHTML = ""
            requests.forEach(function (req) {
                const isActive = String(req.id) === String(requestId)
                const item = document.createElement("div")
                item.className = "req-item" + (isActive ? " active" : "")
                item.innerHTML =
                    '<div class="req-item-title">' + req.title + '</div>' +
                    '<div class="req-item-meta">' +
                    '<div class="req-item-dot"></div>' +
                    '<span class="req-item-email">' + req.email + '</span>' +
                    '</div>'
                item.addEventListener("click", function () {
                    const url = new URL(window.location.href)
                    url.searchParams.set("id", req.id)
                    window.location.href = url.toString()
                })
                list.appendChild(item)
            })
        }

        function filterSidebar(query) {
            const q = query.toLowerCase()
            const filtered = allRequests.filter(function (r) {
                return r.title.toLowerCase().includes(q) || r.email.toLowerCase().includes(q)
            })
            renderSidebar(filtered)
        }

        loadSidebar()
    </script>

</body>

</html>
