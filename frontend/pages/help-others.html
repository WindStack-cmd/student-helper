<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNT MODE | StudentsHelper</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%237b42fa' width='100' height='100'/><text x='50' y='50' font-size='80' fill='%23ccff00' text-anchor='middle' dy='.3em' font-weight='bold'>S</text></svg>">
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #030305;
            --bg-surface: #0a0a0e;
            --bg-elevated: #111118;

            --text-primary: #ffffff;
            --text-secondary: #84849a;
            --text-tertiary: #4a4a5e;

            --accent-lime: #ccff00;
            --accent-purple: #7b42fa;
            --accent-blue: #00e5ff;

            --border-dim: rgba(255, 255, 255, 0.05);
            --border-bright: rgba(255, 255, 255, 0.15);

            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --danger-red: #ff3366;
            --success-green: #ccff00;
            --warning-amber: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ----- LEFT PANEL: NAVIGATION TREE ----- */
        .sidebar-nav {
            width: 260px;
            height: 100%;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .brand-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--text-primary);
            color: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .brand-header:hover .brand-icon {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent-lime);
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            flex: 1;
            padding: 32px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .nav-menu::-webkit-scrollbar {
            width: 4px;
        }

        .nav-menu::-webkit-scrollbar-thumb {
            background: var(--border-dim);
        }

        .nav-section h4 {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            padding-left: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-item.active {
            background: rgba(255, 51, 102, 0.05);
            /* Red tinted for Hunt Mode */
            color: var(--danger-red);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 20px;
            width: 3px;
            background: var(--danger-red);
            border-radius: 0 4px 4px 0;
        }

        .nav-item:hover:not(.active) {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .nav-badge {
            margin-left: auto;
            background: var(--text-primary);
            color: var(--bg-base);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .sidebar-footer {
            padding: 32px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-footer:hover {
            background: var(--bg-elevated);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--danger-red);
            border: 1px solid var(--border-dim);
            font-size: 0.85rem;
        }

        .user-info {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* ----- MIDDLE PANEL: WORKSPACE ----- */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-base);
            position: relative;
            overflow: hidden;
        }

        /* Radar scan background */
        .workspace::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(255, 51, 102, 0.03) 100%);
            background-size: 100% 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Grid overlay */
        .workspace::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 51, 102, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 51, 102, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        .workspace-header {
            height: 85px;
            padding: 0 48px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(3, 3, 5, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .workspace-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--danger-red);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .workspace-actions {
            display: flex;
            gap: 16px;
        }

        .btn-icon-sys {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-icon-sys:hover {
            color: var(--danger-red);
            border-color: var(--danger-red);
            background: rgba(255, 51, 102, 0.05);
        }

        .workspace-content {
            padding: 48px;
            overflow-y: auto;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .workspace-content::-webkit-scrollbar {
            width: 4px;
        }

        .workspace-content::-webkit-scrollbar-thumb {
            background: var(--danger-red);
            opacity: 0.5;
        }

        /* Bounties Grid Layout */
        .hunt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .bounty-card {
            background: rgba(10, 10, 14, 0.8);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .bounty-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 2px;
            background: var(--danger-red);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bounty-card:hover {
            border-color: rgba(255, 51, 102, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(255, 51, 102, 0.05);
        }

        .bounty-card:hover::before {
            opacity: 1;
        }

        .bounty-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .bounty-title {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .bounty-type {
            font-family: var(--font-mono);
            font-size: 0.70rem;
            font-weight: 700;
            color: var(--danger-red);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bounty-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .bounty-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-dim);
            padding-top: 16px;
            margin-top: auto;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-dim);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge.pending {
            color: var(--warning-amber);
            border-color: rgba(255, 170, 0, 0.3);
            background: rgba(255, 170, 0, 0.05);
        }

        .status-badge.completed {
            color: var(--success-green);
            border-color: rgba(204, 255, 0, 0.3);
            background: rgba(204, 255, 0, 0.05);
        }

        .status-badge.in-progress {
            color: var(--accent-blue);
            border-color: rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.05);
        }

        .btn-hunt {
            background: transparent;
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
            padding: 6px 16px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-hunt:hover {
            background: var(--danger-red);
            color: var(--bg-base);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
        }

        .btn-view {
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--text-primary);
            padding: 6px 16px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-view:hover {
            border-color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .accepted-info {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--success-green);
            background: rgba(204, 255, 0, 0.05);
            border: 1px solid rgba(204, 255, 0, 0.2);
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            text-align: center;
            color: var(--text-tertiary);
        }

        .empty-state i {
            width: 48px;
            height: 48px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-family: var(--font-mono);
            font-size: 1.25rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-bright);
            margin: 10% auto;
            padding: 32px;
            width: 80%;
            max-width: 600px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            color: var(--text-secondary);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--danger-red);
        }

        #modalTitle {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 24px;
            padding-right: 32px;
        }

        #modalDetails p {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        #modalDetails strong {
            color: var(--text-primary);
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-right: 8px;
        }

        /* Filter Panel Styles */
        .filter-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 24px;
            background-color: var(--bg-elevated);
            border-bottom: 1px solid var(--border-dim);
        }

        .search-box {
            padding: 10px 12px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-bright);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
        }

        .search-box::placeholder {
            color: var(--text-tertiary);
        }

        .filter-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 12px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-bright);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .filter-select option {
            background-color: var(--bg-surface);
            color: var(--text-primary);
        }

        /* Animations */
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .sidebar-nav {
                width: 80px;
            }

            .brand-name,
            .nav-item span,
            .nav-badge,
            .user-info {
                display: none;
            }
        }

        @media (max-width: 768px) {
            html,
            body {
                overflow-x: hidden;
                width: 100%;
                max-width: 100vw;
            }

            #app {
                display: block;
            }

            .sidebar-nav {
                display: none !important;
                width: 0 !important;
                min-width: 0 !important;
                max-width: 0 !important;
                overflow: hidden !important;
                position: absolute !important;
                left: -9999px !important;
            }

            .workspace {
                width: 100% !important;
                margin-left: 0 !important;
            }

            .workspace-header {
                height: auto;
                min-height: 72px;
                padding: 10px 12px;
                align-items: flex-start;
                gap: 10px;
            }

            .workspace-title {
                font-size: 1.05rem;
                line-height: 1.15;
                flex: 1;
                min-width: 0;
                white-space: normal;
            }

            .workspace-actions {
                flex-shrink: 0;
                gap: 8px;
            }

            .btn-icon-sys {
                width: 38px;
                height: 38px;
            }

            .filter-panel {
                padding: 12px;
                gap: 10px;
            }

            .filter-controls {
                flex-direction: column;
                gap: 10px;
            }

            .filter-select,
            .search-box {
                width: 100%;
            }

            .workspace-content {
                padding: 12px;
            }

            .hunt-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .bounty-card {
                padding: 16px;
            }

            .bounty-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <aside class="sidebar-nav">
            <a href="../index.html" class="brand-header">
                <div class="brand-icon">
                    <i data-lucide="terminal" style="width: 18px; height: 18px;"></i>
                </div>
                <div class="brand-name">StudentsHelper</div>
            </a>

            <div class="nav-menu">
                <div class="nav-section">
                    <h4>Workspace</h4>
                    <a href="dashboard.html" class="nav-item">
                        <i data-lucide="cpu" style="width: 18px; height: 18px;"></i>
                        <span>Overview</span>
                    </a>
                    <a href="community-chat.html" class="nav-item">
                        <i data-lucide="radio" style="width: 18px; height: 18px;"></i>
                        <span>Network</span>
                        <span class="nav-badge">3</span>
                    </a>
                    <a href="leaderboard.html" class="nav-item">
                        <i data-lucide="bar-chart-2" style="width: 18px; height: 18px;"></i>
                        <span>Ledger</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>Operations</h4>
                    <a href="my-requests.html" class="nav-item">
                        <i data-lucide="folder-open" style="width: 18px; height: 18px;"></i>
                        <span>Active Bounties</span>
                    </a>
                    <a href="help-others.html" class="nav-item active">
                        <i data-lucide="crosshair" style="width: 18px; height: 18px;"></i>
                        <span>Hunt Mode</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>System</h4>
                    <a href="profile.html" class="nav-item">
                        <i data-lucide="user" style="width: 18px; height: 18px;"></i>
                        <span>Identity</span>
                    </a>
                    <a href="settings.html" class="nav-item">
                        <i data-lucide="sliders" style="width: 18px; height: 18px;"></i>
                        <span>Config</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-footer" onclick="window.location.href='profile.html'" title="View Profile">
                <div class="user-avatar" id="sidebarAvatar">JD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarName">John Doe</div>
                    <div class="user-role">...</div>
                </div>
                <i data-lucide="power" onclick="event.stopPropagation(); logout()"
                    style="color: var(--danger-red); width: 16px; height: 16px; margin-left: auto; cursor: pointer;" title="Logout"></i>
            </div>
        </aside>

        <!-- MIDDLE PANEL: Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <h1 class="workspace-title"><i data-lucide="crosshair" style="width: 28px; height: 28px;"></i> Hunt
                    Mode: Active Requests</h1>
                <div class="workspace-actions">
                    <button class="btn-icon-sys" onclick="location.reload()" title="Refresh Scan"><i
                            data-lucide="rotate-cw" style="width: 18px; height: 18px;"></i></button>
                    <button class="btn-icon-sys"><i data-lucide="filter"
                            style="width: 18px; height: 18px;"></i></button>
                </div>
            </header>

            <div class="filter-panel">
                <input type="text" id="searchInput" class="search-box" placeholder="Search by title or description...">
                <div class="filter-controls">
                    <select id="statusFilter" class="filter-select">
                        <option value="all">All Status</option>
                        <option value="open" selected>Open</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                    <select id="bountyFilter" class="filter-select">
                        <option value="">All Bounties</option>
                        <option value="0-99">0-99 PTS</option>
                        <option value="100-499">100-499 PTS</option>
                        <option value="500-999">500-999 PTS</option>
                        <option value="1000+">1000+ PTS</option>
                    </select>
                    <select id="sortFilter" class="filter-select">
                        <option value="newest">Sort: Newest</option>
                        <option value="highest_bounty">Sort: Highest Bounty</option>
                        <option value="most_viewed">Sort: Most Viewed</option>
                    </select>
                </div>
            </div>

            <div class="workspace-content">
                <div class="hunt-grid" id="helpRequestsContainer">
                    <!-- Cards will be populated here via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for viewing request details -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeRequestModal()">&times;</span>
            <h2 id="modalTitle">Request Title</h2>
            <div id="modalDetails"></div>
        </div>
    </div>


    <script>
        lucide.createIcons();

        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "../index.html";
        }


        function closeRequestModal() {
            document.getElementById("requestModal").style.display = "none";
        }

        window.onclick = function (event) {
            const modal = document.getElementById("requestModal");
            if (event.target === modal) {
                modal.style.display = "none";
            }
        };


        window.currentRequests = [];

        // Filter and render requests based on current filter values
        async function filterAndRenderRequests() {
            // We now re-fetch using backend handling for sort/status
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const statusFilter = document.getElementById("statusFilter").value;
            const sortFilter = document.getElementById("sortFilter").value;

            try {
                const res = await fetch(`http://127.0.0.1:5001/get_requests?status=${statusFilter}&sort=${sortFilter}&search=${encodeURIComponent(searchTerm)}`);
                if (!res.ok) throw new Error("HTTP error " + res.status);
                const result = await res.json();
                let data = result.data || [];
                
                // Local bounty filter (fallback since backend doesn't handle bounty brackets natively yet)
                const bountyFilter = document.getElementById("bountyFilter").value;
                if (bountyFilter) {
                    data = data.filter(req => {
                        const bounty = req.bounty || 0;
                        if (bountyFilter === "0-99" && (bounty < 0 || bounty > 99)) return false;
                        if (bountyFilter === "100-499" && (bounty < 100 || bounty > 499)) return false;
                        if (bountyFilter === "500-999" && (bounty < 500 || bounty > 999)) return false;
                        if (bountyFilter === "1000+" && bounty < 1000) return false;
                        return true;
                    });
                }
                
                window.currentRequests = data;
                renderRequests(data);
            } catch (e) {
                console.error("Filter error:", e);
                // Fallback to local
                renderRequests(window.currentRequests);
            }
        }

        // Render requests to the container
        function renderRequests(data) {
            const container = document.getElementById("helpRequestsContainer");
            container.innerHTML = "";

            if (!data || data.length === 0) {
                container.innerHTML = `
                <div class="empty-state">
                    <p class="empty-state-title">NO_DATA_FOUND</p>
                    <p class="empty-state-subtitle">No open requests right now. Check back soon or invite a classmate.</p>
                </div>
            `;
                return;
            }

            data.forEach(req => {
                let badgeClass = "pending";
                let badgeText = "OPEN";
                let badgeIcon = "clock";
                if (req.solved || req.status === "closed") {
                    badgeClass = "completed";
                    badgeText = "COMPLETED";
                    badgeIcon = "check-circle";
                } else if (req.status === "captured") {
                    badgeClass = "in-progress";
                    badgeText = "IN PROGRESS";
                    badgeIcon = "activity";
                }

                let actions = "";
                if (req.status === "open") {
                    actions = `<button class="btn-view" onclick="inspectRequest(${req.id})">INSPECT</button>
                               <button id="cap-btn-${req.id}" class="btn-hunt" onclick="captureRequest(${req.id})">CAPTURE</button>`;
                } else {
                    actions = `<button class="btn-view" onclick="inspectRequest(${req.id})">VIEW DETAILS</button>`;
                }

                container.innerHTML += `
            <div class="bounty-card" id="bounty-card-${req.id}">
                <div class="bounty-header">
                    <div>
                        <div class="bounty-type">Posted by: ${req.email}</div>
                        <div class="bounty-title">${req.title}</div>
                    </div>
                    <div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--warning-amber);font-weight:700;">${req.bounty || 0} PTS</div>
                </div>
                <p class="bounty-desc">${req.description}</p>
                <div class="bounty-meta">
                    <span class="status-badge ${badgeClass}" style="cursor:pointer;" onclick="window.location.href='request-details.html?id=${req.id}'">
                        <i data-lucide="${badgeIcon}" style="width:12px;height:12px;"></i>
                        ${badgeText}
                    </span>
                    <div style="display:flex; gap:8px;">
                        ${actions}
                    </div>
                </div>
            </div>
            `;
            });
            lucide.createIcons();
        }

        async function loadHuntMode() {
            try {
                const res = await fetch("http://127.0.0.1:5001/get_requests");

                if (res.status === 429) {
                    throw new Error("Rate limit exceeded. Please try again later.");
                }

                if (!res.ok) throw new Error(`HTTP ${res.status}: Network response was not ok`);
                const result = await res.json();

                // Backend now returns { data: [...], total: ... }
                const data = result.data || [];
                window.currentRequests = data;

                // Initial render with all requests
                renderRequests(data);
            } catch (e) {
                console.error("Failed to load requests", e);
                const container = document.getElementById("helpRequestsContainer");
                container.innerHTML = `<div class="empty-state"><p>Error loading requests: ${e.message}</p></div>`;
            }
        }

        function inspectRequest(id) {
            const req = window.currentRequests.find(r => r.id === id);
            if (!req) return;
            const modal = document.getElementById("requestModal");
            document.getElementById("modalTitle").innerHTML = `<i data-lucide="file-search" style="display:inline; color: var(--danger-red);"></i> ${req.title}`;
            document.getElementById("modalDetails").innerHTML = `
        <p><strong>Poster Email:</strong> ${req.email}</p>
        <p><strong>Bounty:</strong> ${req.bounty || 0} PTS</p>
        <p><strong>Log Entry:</strong><br><br> ${req.description}</p>
    `;
            lucide.createIcons();
            modal.style.display = "block";
        }

        async function captureRequest(id) {
            const userStr = localStorage.getItem("loggedInUser");
            if (!userStr) {
                alert("Please login first");
                return;
            }
            const email = JSON.parse(userStr).email;
            const btn = document.getElementById("cap-btn-" + id);
            const card = document.getElementById("bounty-card-" + id);
            if (btn) btn.innerText = "Capturing...";

            try {
                const res = await fetch("http://127.0.0.1:5001/accept_post", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ post_id: id, email: email })
                });
                if (res.ok) {
                    // Remove the card from the grid immediately
                    if (card) {
                        card.style.transition = "opacity 0.3s";
                        card.style.opacity = "0";
                        setTimeout(() => card.remove(), 300);
                    }
                    alert("Success! Request captured. Head to your requests to submit an answer.");
                } else {
                    alert("Failed to capture: " + res.status);
                    if (btn) btn.innerText = "CAPTURE";
                }
            } catch (e) {
                alert("Error capturing request");
                if (btn) btn.innerText = "CAPTURE";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadHuntMode();

            // Add filter event listeners
            document.getElementById("searchInput").addEventListener("input", filterAndRenderRequests);
            document.getElementById("statusFilter").addEventListener("change", filterAndRenderRequests);
            document.getElementById("bountyFilter").addEventListener("change", filterAndRenderRequests);
            document.getElementById("sortFilter").addEventListener("change", filterAndRenderRequests);

            const userStr = localStorage.getItem("loggedInUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const name = user.first_name || user.name || (user.email ? user.email.split("@")[0] : "User");
                    const email = user.email || "user@system.node";

                    document.querySelectorAll('.user-name').forEach(el => el.innerText = name);
                    document.querySelectorAll('.user-avatar').forEach(el => el.innerText = name.charAt(0).toUpperCase());
                    document.querySelectorAll('.user-role').forEach(el => el.innerText = email);
                } catch (e) { }
            }
        });
    </script>
</body>


</html>
