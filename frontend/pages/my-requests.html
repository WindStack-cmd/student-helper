<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACTIVE BOUNTIES | StudentsHelper</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%237b42fa' width='100' height='100'/><text x='50' y='50' font-size='80' fill='%23ccff00' text-anchor='middle' dy='.3em' font-weight='bold'>S</text></svg>">
    <!-- Fonts for Cyber Editorial theme -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #030305;
            --bg-surface: #0a0a0e;
            --bg-elevated: #111118;

            --text-primary: #ffffff;
            --text-secondary: #84849a;
            --text-tertiary: #4a4a5e;

            --accent-lime: #ccff00;
            --accent-purple: #7b42fa;
            --accent-blue: #00e5ff;

            --border-dim: rgba(255, 255, 255, 0.05);
            --border-bright: rgba(255, 255, 255, 0.15);

            --font-display: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --danger-red: #ff3366;
            --success-green: #ccff00;
            --warning-amber: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* ----- LEFT PANEL: NAVIGATION TREE ----- */
        .sidebar-nav {
            width: 260px;
            height: 100%;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .brand-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--text-primary);
            color: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .brand-header:hover .brand-icon {
            transform: scale(1.1) rotate(5deg);
            background: var(--accent-lime);
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .nav-menu {
            flex: 1;
            padding: 32px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .nav-menu::-webkit-scrollbar {
            width: 4px;
        }

        .nav-menu::-webkit-scrollbar-thumb {
            background: var(--border-dim);
        }

        .nav-section h4 {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            padding-left: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-item.active {
            background: rgba(204, 255, 0, 0.05);
            /* Lime tinted for Active Bounties */
            color: var(--accent-lime);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 20px;
            width: 3px;
            background: var(--accent-lime);
            border-radius: 0 4px 4px 0;
        }

        .nav-item:hover:not(.active) {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .nav-badge {
            margin-left: auto;
            background: var(--text-primary);
            color: var(--bg-base);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .sidebar-footer {
            padding: 32px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar-footer:hover {
            background: var(--bg-elevated);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--accent-lime);
            border: 1px solid var(--border-dim);
            font-size: 0.85rem;
        }

        .user-info {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* ----- MIDDLE PANEL: WORKSPACE ----- */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-base);
            position: relative;
            overflow: hidden;
        }

        /* Ambient scanline effect */
        .workspace::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(204, 255, 0, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .workspace-header {
            height: 85px;
            padding: 0 48px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(3, 3, 5, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .workspace-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-lime);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .workspace-actions {
            display: flex;
            gap: 16px;
        }

        .btn-sys-main {
            padding: 0 24px;
            height: 44px;
            border-radius: 8px;
            background: var(--text-primary);
            color: var(--bg-base);
            border: 1px solid var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-sys-main:hover {
            background: var(--text-primary);
            color: var(--bg-base);
            box-shadow: 4px 4px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-icon-sys {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-icon-sys:hover {
            color: var(--accent-lime);
            border-color: var(--accent-lime);
            background: rgba(204, 255, 0, 0.05);
        }

        .workspace-content {
            padding: 48px;
            overflow-y: auto;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .workspace-content::-webkit-scrollbar {
            width: 4px;
        }

        .workspace-content::-webkit-scrollbar-thumb {
            background: var(--border-dim);
        }


        /* Table Layout for "My Requests" Log */
        .log-container {
            background: rgba(10, 10, 14, 0.8);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .log-table {
            width: 100%;
            border-collapse: collapse;
        }

        .log-table th {
            text-align: left;
            padding: 24px 32px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-dim);
            background: rgba(255, 255, 255, 0.02);
        }

        .log-table td {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-dim);
            vertical-align: top;
            transition: background 0.2s;
        }

        .log-table tbody tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .log-table tbody tr:last-child td {
            border-bottom: none;
        }

        .col-id {
            font-family: var(--font-mono);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .col-details {
            width: 40%;
        }

        .bounty-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .bounty-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .col-status {
            font-family: var(--font-mono);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-dim);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge.pending {
            color: var(--warning-amber);
            border-color: rgba(255, 170, 0, 0.3);
            background: rgba(255, 170, 0, 0.05);
        }

        .status-badge.completed {
            color: var(--success-green);
            border-color: rgba(204, 255, 0, 0.3);
            background: rgba(204, 255, 0, 0.05);
        }

        .col-claimant {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .claimant-box {
            display: inline-flex;
            flex-direction: column;
            gap: 4px;
        }

        .claimant-id {
            font-family: var(--font-mono);
            color: var(--text-primary);
            font-weight: 700;
        }

        .claimant-date {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            text-align: center;
            color: var(--text-tertiary);
        }

        .empty-state i {
            width: 48px;
            height: 48px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-family: var(--font-mono);
            font-size: 1.25rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Animations */
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .sidebar-nav {
                width: 80px;
            }

            .brand-name,
            .nav-item span,
            .nav-badge,
            .user-info {
                display: none;
            }

            .log-table th:nth-child(1),
            .log-table td:nth-child(1),
            .log-table th:nth-child(4),
            .log-table td:nth-child(4) {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- LEFT PANEL: Navigation Tree -->
        <aside class="sidebar-nav">
            <a href="../index.html" class="brand-header">
                <div class="brand-icon">
                    <i data-lucide="terminal" style="width: 18px; height: 18px;"></i>
                </div>
                <div class="brand-name">StudentsHelper</div>
            </a>

            <div class="nav-menu">
                <div class="nav-section">
                    <h4>Workspace</h4>
                    <a href="dashboard.html" class="nav-item">
                        <i data-lucide="cpu" style="width: 18px; height: 18px;"></i>
                        <span>Overview</span>
                    </a>
                    <a href="community-chat.html" class="nav-item">
                        <i data-lucide="radio" style="width: 18px; height: 18px;"></i>
                        <span>Network</span>
                        <span class="nav-badge">3</span>
                    </a>
                    <a href="leaderboard.html" class="nav-item">
                        <i data-lucide="bar-chart-2" style="width: 18px; height: 18px;"></i>
                        <span>Ledger</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>Operations</h4>
                    <a href="my-requests.html" class="nav-item active">
                        <i data-lucide="folder-open" style="width: 18px; height: 18px;"></i>
                        <span>Active Bounties</span>
                    </a>
                    <a href="help-others.html" class="nav-item">
                        <i data-lucide="crosshair" style="width: 18px; height: 18px;"></i>
                        <span>Hunt Mode</span>
                    </a>
                </div>

                <div class="nav-section">
                    <h4>System</h4>
                    <a href="profile.html" class="nav-item">
                        <i data-lucide="user" style="width: 18px; height: 18px;"></i>
                        <span>Identity</span>
                    </a>
                    <a href="settings.html" class="nav-item">
                        <i data-lucide="sliders" style="width: 18px; height: 18px;"></i>
                        <span>Config</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-footer" onclick="window.location.href='profile.html'" title="View Profile">
                <div class="user-avatar" id="sidebarAvatar">JD</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarName">John Doe</div>
                    <div class="user-role">...</div>
                </div>
                <i data-lucide="power" onclick="event.stopPropagation(); logout()"
                    style="color: var(--danger-red); width: 16px; height: 16px; margin-left: auto; cursor: pointer;" title="Logout"></i>
            </div>
        </aside>

        <!-- MIDDLE PANEL: Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <h1 class="workspace-title"><i data-lucide="folder-open" style="width: 28px; height: 28px;"></i> Active
                    Bounties</h1>
                <div class="workspace-actions">
                    <button class="btn-icon-sys" onclick="location.reload()" title="Refresh Ledger"><i
                            data-lucide="rotate-cw" style="width: 18px; height: 18px;"></i></button>
                    <!-- Instead of modal, a direct "Broadcast" action can be tied to dashboard -->
                    <button class="btn-sys-main" onclick="location.href='request-help.html'">
                        <i data-lucide="plus" style="width: 16px; height: 16px;"></i>
                        Broadcast New
                    </button>
                </div>
            </header>

            <div class="workspace-content">
                <div class="log-container" id="logContainer" style="display:none;">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>Tx Hash</th>
                                <th>Bounty Data</th>
                                <th>Network State</th>
                                <th>Resolved By</th>
                            </tr>
                        </thead>
                        <tbody id="requestsContainer">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>

                <div id="emptyContainer" style="display:none;">
                    <!-- Empty state populated via JS -->
                </div>
            </div>
        </main>
    </div>
<script>
lucide.createIcons();

function logout() {
    window.location.href = "login.html";
}

const tbody = document.getElementById("requestsContainer");
const logContainer = document.getElementById("logContainer");
const emptyContainer = document.getElementById("emptyContainer");

function generatePulseHash() {
    return "0x" + Math.floor(Math.random()*16777215)
        .toString(16)
        .toUpperCase()
        .padStart(6,'0');
}


async function loadRequests(){
try{
    const userStr = localStorage.getItem("loggedInUser");
    if (!userStr) {
        window.location.href = "login.html";
        return;
    }

    const res = await fetch("http://127.0.0.1:5001/get_active_bounties");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    tbody.innerHTML = "";

    if(!data || data.length === 0){
        emptyContainer.style.display = "block";
        logContainer.style.display = "none";
        emptyContainer.innerHTML = `
        <div class="empty-state">
            <p class="empty-state-title">NO_DATA_FOUND</p>
            <p class="empty-state-subtitle">You haven't posted any requests yet. Post your first question to get started.</p>
        </div>
        `;
        lucide.createIcons();
        return;
    }

    logContainer.style.display = "block";
    emptyContainer.style.display = "none";

    data.forEach(req => {
        const tr = document.createElement("tr");
        const hash = generatePulseHash();
        
        const isSolved = req.solved;
        const statusClass = isSolved ? 'completed' : (req.status === 'open' ? 'pending' : 'pending');
        const statusText = isSolved ? 'SOLVED' : req.status.toUpperCase();
        const statusIcon = isSolved ? 'check-circle' : (req.status === 'open' ? 'loader-2' : 'user-check');
        const iconStyle = req.status === 'open' && !isSolved ? "width:12px;height:12px;animation:spin 2s linear infinite;" : "width:12px;height:12px;";
        
        let claimantHTML = `<span style="color: var(--text-tertiary); font-style: italic;">Awaiting Claim</span>`;
        if (req.captured_by) {
            claimantHTML = `<div class="claimant-box"><span class="claimant-id">${req.captured_by}</span></div>`;
        }

        tr.innerHTML = `
        <td class="col-id">${hash}</td>

        <td class="col-details">
        <div class="bounty-title">${req.title}</div>
        <p class="bounty-desc">${req.description || "No description logged."}</p>
        <div style="font-family: var(--font-mono); font-size:0.75rem; color:var(--text-secondary); margin-top:8px;">
        Posted by: ${req.email}
        </div>
        <div style="font-family: var(--font-mono); font-size:0.75rem; color:var(--text-tertiary); margin-top:4px;">
        TIMESTAMP: ${new Date().toLocaleDateString()}
        </div>
        </td>

        <td class="col-status">
        <span class="status-badge ${statusClass}">
        <i data-lucide="${statusIcon}" style="${iconStyle}"></i>
        ${statusText}
        </span>
        </td>

        <td class="col-claimant">
        ${claimantHTML}
        </td>
        `;

        tbody.appendChild(tr);
    });

    lucide.createIcons();

}

catch(error){

console.error("ERROR_LOADING_REQUESTS", error);

emptyContainer.style.display = "block";

emptyContainer.innerHTML = `
<div class="empty-state">
<i data-lucide="alert-triangle"></i>
<h2>Network Error</h2>
<p>Unable to load requests from server.</p>
</div>
`;

lucide.createIcons();

}

}

document.addEventListener("DOMContentLoaded", function() {
    loadRequests();
});

</script>
    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    


    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const userStr = localStorage.getItem("loggedInUser");
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    const name = user.first_name || user.name || (user.email ? user.email.split("@")[0] : "User");
                    const email = user.email || "user@system.node";
                    
                    document.querySelectorAll('.user-name').forEach(el => el.innerText = name);
                    document.querySelectorAll('.user-avatar').forEach(el => el.innerText = name.charAt(0).toUpperCase());
                    document.querySelectorAll('.user-role').forEach(el => el.innerText = email);
                } catch(e) {}
            }
        });
    </script>
</body>


</html>
